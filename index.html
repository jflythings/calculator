                    onChange={v=>setP({...p,retTaxableIncome:v})}
                    min={0} max={250000} step={1000}
                    fmt={v=>`${$(v)}/yr`}
                  />
                  <div style={{ fontSize:10, color:C.muted, marginBottom:10, lineHeight:1.5 }}>
                    Includes portfolio draws, SS, 401k withdrawals. VA disability excluded from ACA MAGI.
                  </div>
                  {(()=>{
                    const married = p.filingStatus === "mfj";
                    const r = calcACA(p.retTaxableIncome);
                    const fpl = married ? FPL_MFJ : FPL_SINGLE;
                    const unsubRaw = (p.hasVA&&p.vaHealthVet ? p.vetHC : p.selfHC) + (married ? p.spouseHC : 0);
                    return (
                      <div style={{ background:"rgba(242,86,112,0.07)", border:`1px solid rgba(242,86,112,0.2)`, borderRadius:8, padding:"10px 12px" }}>
                        <KV k="FPL %" v={`${r.fplPct.toFixed(0)}% (${$(fpl*4)}/yr cliff)`} vc={r.fplPct>400?C.red:C.gold}/>
                        <KV k="Monthly subsidy" v={r.subsidy>0?$(r.subsidy)+"/mo":"None — above 400% FPL"} vc={r.subsidy>0?C.green:C.muted}/>
                        <KV k="Your pre-65 monthly premium" v={$(r.premium)+"/mo"} vc={C.orange} bold/>
                        <KV k="Annual healthcare cost" v={$(r.premium*12)+"/yr"} vc={C.red}/>
                        {r.subsidy>0&&<div style={{ fontSize:10, color:C.green, marginTop:4 }}>
                          Subsidy saves {$(r.subsidy*12)}/yr vs unsubsidized {$(unsubRaw)}/mo
                        </div>}
                        <div style={{ fontSize:10, color:C.muted, marginTop:6 }}>
                          Used in your projection · inflated at {(p.inflation*1.25).toFixed(1)}%/yr
                        </div>
                      </div>
                    );
                  })()}
                  {/* Still need unsubsidized baseline inputs */}
                  <div style={{ marginTop:10 }}>
                    <SectionDivider label="UNSUBSIDIZED BASELINE (used if above 400% FPL)" color={C.muted}/>
                    {!p.hasVA&&<Field label="Your unsubsidized monthly premium" value={p.selfHC} onChange={v=>setP({...p,selfHC:v})} prefix="$" note="ACA benchmark Silver plan age 55–64: ~$700–1,400/mo"/>}
                    {p.filingStatus==="mfj"&&<Field label="Spouse unsubsidized monthly premium" value={p.spouseHC} onChange={v=>setP({...p,spouseHC:v})} prefix="$"/>}
                  </div>
                </div>
              ) : (
                <div>
                  {p.hasVA&&p.vaHealthVet
                    ? <Field label="Your VA copays (monthly)" value={p.vetHC} onChange={v=>setP({...p,vetHC:v})} prefix="$" note="Priority Group 2: typically $0–50/mo"/>
                    : <Field label="Your pre-65 healthcare (monthly)" value={p.selfHC} onChange={v=>setP({...p,selfHC:v})} prefix="$" note="2026 ACA unsubsidized: ~$700–1,400/mo age 55–64"/>
                  }
                  {p.filingStatus==="mfj"&&<Field label="Spouse pre-65 healthcare (monthly)" value={p.spouseHC} onChange={v=>setP({...p,spouseHC:v})} prefix="$"/>}
                </div>
              )}

              <Field label="Post-65 Medicare + supplement per person" value={p.post65HC} onChange={v=>setP({...p,post65HC:v})} prefix="$" note="2026: Part B $202.90 + Part D ~$39 + Medigap ~$180 = ~$420/person"/>
            </div>

            {/* ACCOUNTS */}
            <div style={S.card}>
              <Head title="📂 ACCOUNT BALANCES"/>
              <SectionDivider label="TAX-ADVANTAGED RETIREMENT" color={C.cyan}/>
              <Field label="Traditional 401k / 403b / TSP" value={p.trad401kBal} onChange={v=>setP({...p,trad401kBal:v})} prefix="$" step={500} lc={C.cyan} note="Pre-tax · taxable on withdrawal · includes TSP traditional"/>
              <Field label="Roth 401k / Roth TSP" value={p.roth401kBal} onChange={v=>setP({...p,roth401kBal:v})} prefix="$" step={500} lc={C.cyan} note="After-tax · tax-free on qualified withdrawal · keep in plan for Rule of 55"/>
              <Field label={<><Term>Roth IRA</Term> Balance</>} value={p.rothIRA} onChange={v=>setP({...p,rothIRA:v})} prefix="$" step={500} lc={C.cyan}/>
              <Field label={<><Term>HSA</Term> Balance</>} value={p.hsa} onChange={v=>setP({...p,hsa:v})} prefix="$" step={100} note="Triple tax-advantaged" lc={C.purple}/>
              <SectionDivider label="TAXABLE" color={C.gold}/>
              <Field label="Brokerage / Taxable Investments" value={p.brokerage} onChange={v=>setP({...p,brokerage:v})} prefix="$" step={500} lc={C.gold}/>
              <SectionDivider label="CASH" color={C.green}/>
              <Field label="Savings / Checking / Emergency Fund" value={p.cash} onChange={v=>setP({...p,cash:v})} prefix="$" step={500} note="Target: 3–6 months of total expenses" lc={C.green}/>
              <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:10, marginTop:8 }}>
                <KV k="Traditional 401k / TSP (taxable)" v={$(C2.trad401kTotal)} vc={C.orange}/>
                <KV k="Roth 401k (tax-free)" v={$(C2.roth401kTotal)} vc={C.green}/>
                <KV k="Roth fraction" v={pct(C2.rothFraction*100)} vc={C2.rothFraction>0.4?C.green:C.gold} bold/>
                <KV k="Effective withdrawal tax rate" v={pct(C2.withdrawalTaxRate*100)} vc={C.muted}/>
                <div style={{ fontSize:10, color:C.muted, marginBottom:4 }}>Lower is better — more Roth = lower effective rate</div>
                <KV k="Total invested (excl. cash)" v={$(C2.totalInvested)} vc={C.cyan} bold/>
                <KV k="Total liquid (incl. cash)" v={$(C2.totalLiquid)} vc={C.green} bold/>
                <KV k="FIRE progress today" v={pct(C2.pctFunded)} vc={C2.pctFunded>=50?C.gold:C.red} bold/>
              </div>
            </div>

            {/* CONTRIBUTIONS */}
            <div style={S.card}>
              <Head title="💰 CONTRIBUTIONS"/>
              <Slider label={<><Term>Traditional 401k</Term> / TSP (pre-tax)</>} value={p.trad401kPct} onChange={v=>setP({...p,trad401kPct:v})} min={0} max={25} fmt={v=>`${v}% = ${$(p.salary*v/100)}/yr`}/>
              <Slider label={<><Term>Roth 401k</Term> (post-tax)</>} value={p.roth401kPct} onChange={v=>setP({...p,roth401kPct:v})} min={0} max={25} fmt={v=>`${v}% = ${$(p.salary*v/100)}/yr`}/>
              <Slider label={<><Term>Employer Match</Term></>} value={p.empMatchPct} onChange={v=>setP({...p,empMatchPct:v})} min={0} max={15} fmt={v=>`${v}% = ${$(p.salary*v/100)}/yr`} color={C.gold}/>
              <Slider label="Employer Baseline Contribution" value={p.empBasePct} onChange={v=>setP({...p,empBasePct:v})} min={0} max={10} fmt={v=>`${v}% = ${$(p.salary*v/100)}/yr`} color={C.gold}/>
              <Field label={<><Term>HSA</Term> annual contribution (your portion)</>} value={p.hsaAnnual} onChange={v=>setP({...p,hsaAnnual:v})} prefix="$" step={100} note="2026: $8,750 family · $4,400 individual (+$1,000 at 55+) · Priority #1 after employer match"/>
              <Field label="Employer HSA contribution (annual)" value={p.hsaEmployer} onChange={v=>setP({...p,hsaEmployer:v})} prefix="$" step={100} note="Pre-tax · excluded from your MAGI · counts toward combined IRS limit" lc={C.gold}/>
              <Field label={<><Term>Roth IRA</Term> annual contribution</>} value={p.rothIRAContrib} onChange={v=>setP({...p,rothIRAContrib:Math.min(v,rothIRALimit)})} prefix="$" step={500} note={`2026 max: ${$(rothIRALimit)}${p.curAge>=50?" (age 50+ catch-up included)":""} · limit rises to $8,000 at age 50`}/>
              <Field label="Year Roth IRA was first opened" value={p.rothIRAOpenYear} onChange={v=>setP({...p,rothIRAOpenYear:v})} step={1} min={2000} max={CY} note={`5-year rule satisfies: ${p.rothIRAOpenYear+5} · ${(CY-p.rothIRAOpenYear)>=5?"✓ Already satisfied":"⏳ "+(5-(CY-p.rothIRAOpenYear))+" years remaining"}`}/>
              <Field label="Extra monthly → taxable brokerage" value={p.monthlyBrokerageContrib} onChange={v=>setP({...p,monthlyBrokerageContrib:v})} prefix="$" step={50} note="Overflow after maxing HSA + Roth IRA"/>
              <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:10, marginTop:8 }}>
                <KV k="Your 401k/TSP contribution" v={$(C2.tradAmt+C2.rothAmt)+"/yr"} vc={C.cyan}/>
                <KV k="Employer contributions" v={$(C2.empTotal)+"/yr"} vc={C.gold} bold/>
                <KV k="HSA (your contribution)" v={$(p.hsaAnnual)+"/yr"} vc={C.purple}/>
                {p.hsaEmployer>0&&<KV k="HSA (employer contribution)" v={$(p.hsaEmployer)+"/yr"} vc={C.gold}/>}
                <KV k="Roth IRA" v={$(p.rothIRAContrib)+"/yr"} vc={C.cyan}/>
                <KV k="Total to accounts / year" v={$k(C2.annualToAccounts+p.monthlyBrokerageContrib*12)} vc={C.green} bold/>
              </div>
            </div>
          </div>

          {/* ══ RIGHT COLUMN ══ */}
          <div>
            {/* DEBTS */}
            <div style={S.card}>
              <Head title="💳 DEBTS"/>
              {[
                { nameK:"debt1Name", balK:"debt1Bal", rateK:"debt1Rate", moK:"debt1Monthly", po:C2.debt1, c:C.orange },
                { nameK:"debt2Name", balK:"debt2Bal", rateK:"debt2Rate", moK:"debt2Monthly", po:C2.debt2, c:C.gold },
                { nameK:"debt3Name", balK:"debt3Bal", rateK:"debt3Rate", moK:"debt3Monthly", po:C2.debt3, c:C.purple, note:"Use 0% rate for 401k loans" },
              ].map(({ nameK,balK,rateK,moK,po,c,note },i)=>(
                <div key={i} style={{ background:"#07101e", borderRadius:10, padding:"12px 14px", marginBottom:10 }}>
                  <input value={p[nameK]} onChange={e=>setP({...p,[nameK]:e.target.value})}
                    style={{ ...S.inp, fontSize:13, fontWeight:600, marginBottom:8, color:c }}/>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                    <div><label style={S.label}>Balance</label><div style={{ display:"flex", gap:3 }}><span style={{ color:C.muted, fontSize:12 }}>$</span><input type="text" inputMode="decimal" value={p[balK]} onChange={e=>setP({...p,[balK]:parseFloat(e.target.value.replace(/[^0-9.]/g,""))||0})} style={{ ...S.inp, flex:1 }}/></div></div>
                    <div><label style={S.label}>Rate %</label><input type="text" inputMode="decimal" value={p[rateK]} onChange={e=>setP({...p,[rateK]:parseFloat(e.target.value.replace(/[^0-9.]/g,""))||0})} style={S.inp}/></div>
                    <div><label style={S.label}>Monthly $</label><input type="text" inputMode="decimal" value={p[moK]} onChange={e=>setP({...p,[moK]:parseFloat(e.target.value.replace(/[^0-9.]/g,""))||0})} style={S.inp}/></div>
                  </div>
                  {note&&<div style={{ fontSize:10, color:C.muted, marginTop:4 }}>{note}</div>}
                  {p[balK]>0&&<div style={{ fontSize:10, color:c, marginTop:4 }}>Payoff: ~{po.year} · {$(po.totalInterest)} total interest</div>}
                </div>
              ))}
              {C2.totalNonMortDebt>0&&<div style={{ background:"rgba(34,199,122,0.06)", borderRadius:8, padding:"10px 12px", marginTop:4 }}>
                <KV k="Total non-mortgage debt" v={$(C2.totalNonMortDebt)} vc={C.orange}/>
                <KV k="Monthly payments freed at payoff" v={$(C2.monthlyDebtPayments)} vc={C.green} bold/>
                <KV k="Portfolio equiv. if invested" v={$k(C2.monthlyDebtPayments*12/(p.swr/100))} vc={C.green} bold/>
              </div>}
            </div>

            {/* HOUSING */}
            <div style={S.card}>
              <Head title="🏠 HOUSING" color={C.gold}/>
              <Toggle label="I have a mortgage" checked={p.hasMortgage} onChange={v=>setP({...p,hasMortgage:v,...(!v?{propTax:0,mortBal:0,mortPI:0,mortTotal:0}:{})})}/>
              {p.hasMortgage&&<>
                <Field label="Current balance" value={p.mortBal} onChange={v=>setP({...p,mortBal:v})} prefix="$" step={1000}/>
                <Field label="Monthly P&I payment" value={p.mortPI} onChange={v=>setP({...p,mortPI:v,mortTotal:v})} prefix="$" note="Principal & interest only — property tax and insurance entered separately"/>
                <Field label="Interest rate" value={p.mortRate} onChange={v=>setP({...p,mortRate:v})} suffix="%" step={0.05}/>
                <div style={{ background:"#07101e", borderRadius:8, padding:"10px 12px", marginBottom:10 }}>
                  <KV k="Payoff estimate" v={`~${C2.mort.year} (${C2.mort.months} mo)`} vc={C.gold} bold/>
                  <KV k="Total interest remaining" v={$(C2.mort.totalInterest)} vc={C.red}/>
                  {C2.mort.year <= (CY+C2.ytt)
                    ? <div style={{ fontSize:10, color:C.green, marginTop:4 }}>✓ Paid off before retirement age {p.retAge} — not included in retirement expenses.</div>
                    : <div style={{ fontSize:10, color:C.orange, marginTop:4 }}>Active at retirement — ${$(p.mortTotal)}/mo included in retirement expenses until {C2.mort.year}.</div>
                  }
                  {p.mortRate<4&&<div style={{ fontSize:10, color:C.green, marginTop:2 }}>Low rate — prioritize investing over extra payments.</div>}
                  {p.mortRate>=6&&<div style={{ fontSize:10, color:C.orange, marginTop:2 }}>High rate — extra payments may be worth it.</div>}
                </div>
              </>}
              <Field label="Property Tax (monthly avg)" value={p.propTax} onChange={v=>setP({...p,propTax:v})} prefix="$" step={25} note="Annual tax ÷ 12 · Inflates at 1.5× general rate in projections"/>
              <Field label="Home Insurance (monthly)" value={p.homeInsurance} onChange={v=>setP({...p,homeInsurance:v})} prefix="$" note="Inflates at 1.5× general rate in projections"/>
            </div>

            {/* EXPENSES */}
            <div style={S.card}>
              <Head title="💵 MONTHLY EXPENSES"/>
              <Field label="Food / Groceries" value={p.food} onChange={v=>setP({...p,food:v})} prefix="$"/>
              <Field label="Electric" value={p.electric} onChange={v=>setP({...p,electric:v})} prefix="$"/>
              <Field label="Water & Sewer" value={p.water} onChange={v=>setP({...p,water:v})} prefix="$"/>
              <Field label="Phone" value={p.phone} onChange={v=>setP({...p,phone:v})} prefix="$"/>
              <Field label="Internet" value={p.internet} onChange={v=>setP({...p,internet:v})} prefix="$"/>
              <Field label="Car Insurance" value={p.carInsurance} onChange={v=>setP({...p,carInsurance:v})} prefix="$"/>
              <Field label="Gas / Transportation" value={p.gasMonthly} onChange={v=>setP({...p,gasMonthly:v})} prefix="$"/>
              <Field label="Other (misc. monthly)" value={p.other} onChange={v=>setP({...p,other:v})} prefix="$"/>
              <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:8, marginTop:4 }}>
                <KV k="Total living expenses" v={$(C2.livingMonthly)+"/mo"} vc={C.muted} bold/>
                <KV k="Total all-in expenses" v={$(C2.totalExp)+"/mo"} vc={C.red} bold/>
                <KV k="Net monthly cash flow" v={$(C2.cashFlow)} vc={C2.cashFlow>=0?C.cyan:C.red} bold/>
              </div>
            </div>

            {/* ASSUMPTIONS */}
            <div style={S.card}>
              <Head title="⚙️ ASSUMPTIONS"/>
              <Slider label="Portfolio growth rate" value={p.growth} onChange={v=>setP({...p,growth:v})} min={3} max={14} step={0.5} fmt={v=>`${v}%/yr`}/>
              <div style={{ fontSize:10, color:C.muted, marginBottom:12, lineHeight:1.5 }}>S&P 500 historical: ~10% nominal, ~7% real. Use 7–9% for diversified portfolio.</div>
              <Slider label="Inflation rate" value={p.inflation} onChange={v=>setP({...p,inflation:v})} min={1} max={6} step={0.5} fmt={v=>`${v}%/yr`}/>
              <div style={{ fontSize:10, color:C.muted, marginBottom:12, lineHeight:1.5 }}>Fed target is 2%. Applied to all future expenses. Housing inflates at 1.5×.</div>
              <Slider label={<><Term>Safe Withdrawal Rate</Term></>} value={p.swr} onChange={v=>setP({...p,swr:v})} min={2} max={6} step={0.25} fmt={v=>`${v}% = ${Math.round(100/v)}x rule`}/>
              <div style={{ fontSize:10, color:C.muted, marginBottom:12, lineHeight:1.5 }}>4% = Trinity Study (30yr). 3.5% = early retirement (35–50yr). 3% = perpetual portfolio.</div>
              <Slider label="Plan to age" value={p.planAge} onChange={v=>setP({...p,planAge:v})} min={80} max={105} fmt={v=>`Age ${v}`}/>
              <Field label="Payroll HC premium per paycheck" value={p.hcPremiumPerPaycheck} onChange={v=>setP({...p,hcPremiumPerPaycheck:v})} prefix="$" note="Pre-tax Section 125 deduction — reduces AGI"/>
            </div>

            {/* MATH TRANSPARENCY */}
            <div style={{ ...S.card, border:`1px solid rgba(0,238,255,0.15)` }}>
              <Head title="🔢 MATH TRANSPARENCY" color={C.cyan} sub="Every calculation shown — verify the numbers yourself"/>

              <SectionDivider label="TAXES" color={C.muted}/>
              <MathRow label="Gross salary" value={$(p.salary)} color={C.text}/>
              <MathRow label="Pre-tax deductions" formula={`401k ${$(C2.tradAmt)} + HSA ${$(p.hsaAnnual)} + HC ${$(C2.hcPremAnnual)}`} value={`(${$(C2.preTax)})`} color={C.orange}/>
              <MathRow label={<Term>MAGI</Term>} formula="Salary − pre-tax deductions" value={$(C2.agi)} color={C.gold} note="Determines Roth IRA eligibility and ACA subsidy thresholds"/>
              <MathRow label={`Federal income tax (2026 ${p.filingStatus==="mfj"?"MFJ":"Single"} brackets)`} formula={`Taxable = MAGI − ${$(p.filingStatus==="mfj"?32200:16100)} standard deduction`} value={$(C2.fedTax)} color={C.red}/>
              <MathRow label="FICA (Social Security + Medicare)" formula="Salary × 7.65%" value={$(C2.fica)} color={C.red}/>
              <MathRow label="State tax" formula={`AGI × ${p.stateTax}%`} value={$(C2.stateTaxAmt)} color={C.red}/>
              <MathRow label="Monthly take-home" formula="(Salary − all deductions − taxes) ÷ 12" value={$(C2.takeHome)+"/mo"} color={C.green} bold/>

              <SectionDivider label="FIRE NUMBER" color={C.muted}/>
              <MathRow label="Years to retirement" formula={`Age ${p.retAge} − Age ${p.curAge}`} value={`${C2.ytt} years`} color={C.text}/>
              <MathRow label="Inflation multiplier" formula={`(1 + ${p.inflation}%)^${C2.ytt}`} value={C2.infMult.toFixed(4)+"×"} color={C.muted}/>
              <MathRow label="Annual living expenses (inflated)" formula={`${$(C2.livingMonthly)}/mo × 12 × ${p.retRatio}% × inflation multiplier`} value={$(C2.livInfl)} color={C.muted}/>
              <MathRow label="Healthcare at retirement" value={$(C2.hcAtRet)+"/yr"} color={C.orange}/>
              <MathRow label="Mortgage at retirement" value={$(C2.mortAtRet)+"/yr"} color={C2.mortAtRet>0?C.orange:C.green} note={C2.mortAtRet===0?"Paid off ✓":"Still active"}/>
              <MathRow label="Total expenses needed" formula="Living + HC + Mortgage + Extras" value={$(C2.totalNeed)+"/yr"} color={C.red} bold/>
              <MathRow label="VA disability at retirement" formula={`${$(p.vaMonthly*12)}/yr × (1+${p.vaCola}%)^${C2.ytt}`} value={$(C2.vaAtRet)+"/yr"} color={C.green}/>
              <MathRow label="SS at retirement" value={$(C2.ssAtRet)+"/yr"} color={C.gold}/>
              <MathRow label="Portfolio draw needed" formula="Total expenses − guaranteed income" value={$(C2.drawNeeded)+"/yr"} color={C.orange} bold/>
              <MathRow label={<><Term>SWR</Term> (duration-adjusted)</>} formula={`${C2.retirementYears}-year retirement → ${C2.durationSWR}%`} value={C2.durationSWR+"%"} color={C.cyan} note={C2.durationSWR<p.swr?"Auto-adjusted down for long retirement horizon":"Your setting"}/>
              <MathRow label={<Term>FIRE Number</Term>} formula={`Draw needed ÷ SWR = ${$(C2.drawNeeded)} ÷ ${C2.durationSWR}%`} value={$k(C2.fireNum)+" (future $)"} color={C.gold}/>
              <MathRow label="FIRE Number (today's dollars)" formula="Future FIRE # ÷ inflation multiplier" value={$k(C2.fireNumRealAdj)} color={C.gold} bold/>

              <SectionDivider label="PROJECTION" color={C.muted}/>
              <MathRow label="Current total invested" value={$(C2.totalInvested)} color={C.text}/>
              <MathRow label="Annual contributions" formula={`401k + employer + HSA + Roth IRA + brokerage`} value={$k(C2.annualToAccounts+p.monthlyBrokerageContrib*12)+"/yr"} color={C.cyan}/>
              <MathRow label="Projected at retirement (future $)" formula={`Compound growth over ${C2.ytt} years at ${p.growth}%`} value={$k(C2.proj)} color={C.cyan}/>
              <MathRow label="Projected (today's dollars)" formula="Future projection ÷ inflation multiplier" value={$k(C2.projReal)} color={onTrack?C.green:C.red} bold/>
              <MathRow label="Surplus / Deficit" formula="Projected − FIRE Number (both today's $)" value={(C2.surplus>=0?"+":"")+$k(C2.surplus)} color={C2.surplus>=0?C.green:C.red} bold/>
              <MathRow label="Funded today" formula="Current invested ÷ FIRE Number" value={pct(C2.pctFunded)} color={C2.pctFunded>=50?C.gold:C.red}/>
            </div>

            {/* CONTRIBUTION OPTIMIZER */}
            <div style={S.card}>
              <Head title="💰 CONTRIBUTION OPTIMIZER" sub="How to deploy your savings most efficiently"/>
              <Field label="Monthly savings budget" value={p.monthlySavingsBudget} onChange={v=>setP({...p,monthlySavingsBudget:v})} prefix="$" step={50} note={`${$(p.monthlySavingsBudget*12)}/yr to distribute across accounts`}/>
              {(()=>{
                const annualBudget = p.monthlySavingsBudget * 12;
                const empMatchNeeded = p.salary * (p.empMatchPct / 100);
                const hsaMax = hsaLimitAnnual;
                const rothIRAMax = rothIRALimit;
                let remaining = annualBudget;
                const steps = [];
                const matchContrib = Math.min(remaining, empMatchNeeded); remaining -= matchContrib;
                steps.push({ n:1, label:"401k to capture full match", amount:matchContrib, color:C.green, free:p.salary*p.empMatchPct/100 });
                const hsaGap = Math.max(0, hsaMax - p.hsaAnnual);
                const hsaContrib = Math.min(remaining, hsaGap); remaining -= hsaContrib;
                steps.push({ n:2, label:"HSA — Triple Tax Advantage", amount:hsaContrib, color:C.purple, note:hsaGap===0?`✓ Maxed`:undefined });
                const rothGap = Math.max(0, rothIRAMax - p.rothIRAContrib);
                const rothContrib = Math.min(remaining, rothGap); remaining -= rothContrib;
                steps.push({ n:3, label:"Roth IRA", amount:rothContrib, color:C.cyan, note:rothGap===0?`✓ Maxed`:undefined });
                const extra401k = Math.min(remaining, Math.max(0, k401kLimit-(p.salary*(p.trad401kPct+p.roth401kPct)/100))); remaining -= extra401k;
                steps.push({ n:4, label:"401k beyond match", amount:extra401k, color:"#0bbbd4" });
                steps.push({ n:5, label:"Taxable brokerage (overflow)", amount:remaining, color:C.gold });
                return steps.map(step=>(
                  <div key={step.n} style={{ display:"flex", gap:8, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                    <div style={{ ...S.mono, fontSize:13, color:step.amount>0?step.color:C.muted, fontWeight:700, minWidth:16, opacity:step.amount>0?1:0.35 }}>{step.n}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ fontSize:12, color:step.amount>0?C.text:C.muted, opacity:step.amount>0?1:0.5 }}>{step.label}</span>
                        <span style={{ ...S.mono, fontSize:12, color:step.amount>0?step.color:C.muted, fontWeight:600 }}>{step.amount>0?$(step.amount)+"/yr":"—"}</span>
                      </div>
                      {step.free>0&&<div style={{ fontSize:10, color:C.green }}>+ {$(step.free)}/yr employer FREE</div>}
                      {step.note&&<div style={{ fontSize:10, color:C.muted }}>{step.note}</div>}
                    </div>
                  </div>
                ));
              })()}
              <div style={{ marginTop:10, background:"rgba(34,199,122,0.06)", borderRadius:8, padding:"10px 12px" }}>
                <KV k="Your annual budget" v={$(p.monthlySavingsBudget*12)} vc={C.cyan}/>
                <KV k="Employer match (free)" v={$(p.salary*p.empMatchPct/100)} vc={C.green} bold/>
                <KV k="Total hitting market" v={$(p.monthlySavingsBudget*12+p.salary*p.empMatchPct/100)} vc={C.green} bold/>
              </div>
            </div>

            {/* MAGI MODELING */}
            <div style={S.card}>
              <Head title="🧮 MAGI REDUCTION MODELING" color={C.purple} sub="How pre-tax contributions affect eligibility"/>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.6, marginBottom:10 }}>
                Pre-tax 401k and HSA contributions reduce your <Term>MAGI</Term> — which can unlock <Term>Roth IRA</Term> eligibility and <Term>ACA</Term> subsidies at higher income levels.
              </div>
              {(()=>{
                const magiAfter = Math.max(0, p.salary + (p.spouseIncome||0) - p.salary*(p.trad401kPct/100) - p.hsaAnnual - p.hcPremiumPerPaycheck*PAYCHECKS_YR);
                const mfj2 = p.filingStatus === "mfj";
                const rothLow  = mfj2 ? 242000 : 153000;
                const rothHigh = mfj2 ? 252000 : 168000;
                const eligible = magiAfter < rothHigh;
                return <>
                  <KV k="Gross income" v={$(p.salary+(p.spouseIncome||0))} vc={C.text}/>
                  <KV k="− Traditional 401k" v={`(${$(p.salary*p.trad401kPct/100)})`} vc={C.cyan}/>
                  <KV k="− HSA" v={`(${$(p.hsaAnnual)})`} vc={C.purple}/>
                  <KV k="− Payroll HC premiums" v={`(${$(p.hcPremiumPerPaycheck*PAYCHECKS_YR)})`} vc={C.green}/>
                  <KV k="Estimated MAGI" v={$(magiAfter)} vc={C.gold} bold/>
                  <div style={{ marginTop:10 }}>
                    <KV k={`Roth IRA phase-out (${mfj2?"MFJ":"Single"} 2026)`} v={`$${(rothLow/1000).toFixed(0)}K–$${(rothHigh/1000).toFixed(0)}K`} vc={C.muted}/>
                    <KV k="Roth IRA eligible?" v={eligible?"Yes ✓":"No — consider Backdoor Roth"} vc={eligible?C.green:C.red} bold/>
                  </div>
                  {p.hasVA&&<div style={{ marginTop:8, padding:"8px 10px", background:"rgba(34,199,122,0.07)", borderRadius:6, fontSize:10, color:C.green, lineHeight:1.6 }}>
                    ✓ Your {$(p.vaMonthly*12)}/yr VA disability is excluded from MAGI — does not count toward Roth IRA limits or ACA subsidy calculations.
                  </div>}
                </>;
              })()}
            </div>
          </div>
        </div>

        <div style={{ textAlign:"center", marginTop:20 }}>
          <button onClick={()=>setPage(1)} style={{ padding:"12px 32px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent", color:C.dim, fontFamily:"'Outfit',sans-serif", fontSize:13, fontWeight:600, cursor:"pointer" }}>
            ← Back to Overview
          </button>
        </div>
      </div>
    );
  };

  /* ── MAIN RENDER ── */
  return (
    <div style={S.body}>
      <Header/>
      {page===1&&Page1()}
      {page===2&&Page2()}
      {page===3&&Page3()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RetirementCalc));
</script>
</body>
</html>
