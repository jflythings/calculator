      const current = C2.proj;
      if(current >= target) return 0;
      const gap = target - current;
      const r = p.growth / 100;
      const n = C2.ytt;
      if(n <= 0 || r <= 0) return gap / 12;
      return gap / (((Math.pow(1+r,n)-1)/r));
    };
    const extraMonthlyNeeded = Math.max(0, solveForContrib());

    return (
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 20px" }}>

        {/* ── HEADLINE MESSAGE ── */}
        <div style={{ ...S.card, marginBottom:20, padding:"24px 28px", border:`1px solid ${onTrack?C.green:C2.earliest?"rgba(240,160,80,0.4)":"rgba(242,86,112,0.4)"}`, background:onTrack?"rgba(34,199,122,0.05)":C2.earliest?"rgba(240,160,80,0.04)":"rgba(242,86,112,0.04)" }}>
          {onTrack ? (
            <div>
              <div style={{ fontSize:20, fontWeight:700, color:C.green, marginBottom:6 }}>
                ✅ Your portfolio supports <span style={{ ...S.mono }}>{$(C2.monthlyDraw)}/month</span> through retirement.
              </div>
              <div style={{ fontSize:12, color:C.muted }}>
                Based on {C2.durationSWR}% withdrawal rate · {C2.retirementYears}-year retirement · retiring at age {p.retAge}
              </div>
            </div>
          ) : C2.earliest ? (
            <div>
              <div style={{ fontSize:20, fontWeight:700, color:C.orange, marginBottom:6 }}>
                ⚠️ At your current pace you can retire at <span style={{ ...S.mono }}>age {C2.earliest}</span>.
                {extraMonthlyNeeded > 0 && <span> To retire at <span style={{ ...S.mono }}>age {p.retAge}</span> you need <span style={{ ...S.mono, color:C.cyan }}>{$(extraMonthlyNeeded)}/month</span> more in contributions.</span>}
              </div>
              <div style={{ fontSize:12, color:C.muted }}>
                Shortfall of {$k(Math.abs(C2.surplus))} in today's dollars at age {p.retAge} · Earliest feasible age: {C2.earliest} ({toY(C2.earliest,p.curAge)})
              </div>
            </div>
          ) : (
            <div>
              <div style={{ fontSize:20, fontWeight:700, color:C.red, marginBottom:6 }}>
                📈 Increase contributions or adjust your retirement age to find a feasible plan.
              </div>
              <div style={{ fontSize:12, color:C.muted }}>
                No retirement age between 40–72 is currently feasible with these inputs.
              </div>
            </div>
          )}
        </div>

        {/* ── STAT CARDS ── */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:12, marginBottom:20 }}>
          {[
            { label:"FIRE Number", value:$k(C2.fireNumRealAdj), sub:"Today's dollars needed", color:C.gold, icon:"🎯" },
            { label:"Projected at "+p.retAge, value:$k(C2.projReal), sub:"Today's dollars", color:onTrack?C.green:C.red, icon:"💼" },
            { label:onTrack?"Surplus":"Shortfall", value:(C2.surplus>=0?"+":"")+$k(C2.surplus), sub:"Today's dollars", color:C2.surplus>=0?C.green:C.red, icon:C2.surplus>=0?"✅":"⚠️" },
            { label:"Portfolio draw", value:$(C2.monthlyDraw)+"/mo", sub:`At ${C2.durationSWR}% SWR · age ${p.retAge}`, color:C.cyan, icon:"💵" },
          ].map(({ label,value,sub,color,icon })=>(
            <div key={label} style={{ ...S.card, textAlign:"center", padding:"18px 14px" }}>
              <div style={{ fontSize:20, marginBottom:5 }}>{icon}</div>
              <div style={{ fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted, marginBottom:4 }}>{label}</div>
              <div style={{ ...S.mono, fontSize:19, fontWeight:700, color, lineHeight:1.1 }}>{value}</div>
              <div style={{ fontSize:10, color:C.muted, marginTop:3 }}>{sub}</div>
            </div>
          ))}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          <div>
            {/* ── FIRE FEASIBILITY GRID ── */}
            <div style={S.card}>
              <Head title="⚡ FIRE FEASIBILITY BY RETIREMENT AGE" sub={`Click any age to set as target · Currently: Age ${p.retAge}`}/>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                {C2.sweep.map(f=>{
                  const isTgt=f.age===p.retAge, isFire=f.age===C2.earliest;
                  return (
                    <div key={f.age} onClick={()=>{ const newP={...p,retAge:f.age}; setP(newP); }}
                      style={{ width:52, textAlign:"center", padding:"8px 4px", borderRadius:8, cursor:"pointer",
                        background:isTgt?"rgba(244,185,66,0.15)":isFire?"rgba(0,238,255,0.1)":f.ok?"rgba(34,199,122,0.07)":"rgba(242,86,112,0.07)",
                        border:`1px solid ${isTgt?C.gold:isFire?C.cyan:f.ok?C.green:C.red}`,
                        transition:"all 0.15s" }}>
                      <div style={{ ...S.mono, fontSize:13, fontWeight:700, color:isTgt?C.gold:isFire?C.cyan:f.ok?C.green:C.red }}>{f.age}</div>
                      <div style={{ fontSize:8, color:isFire?C.cyan:isTgt?C.gold:f.ok?C.green:C.red, marginTop:1 }}>
                        {isFire?"FIRE":isTgt?"TARGET":f.ok?"✓":"✗"}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize:10, color:C.muted }}>Green = sustains to age {p.planAge} · Red = depleted before then</div>
            </div>

            {/* ── AGE SNAPSHOT ── */}
            <div style={S.card}>
              <Head title={`📊 AGE ${p.retAge} SNAPSHOT (${toY(p.retAge,p.curAge)})`} sub="All figures in today's dollars"/>
              <KV k={<Term>FIRE Number</Term>} v={$k(C2.fireNumRealAdj)} vc={C.gold} bold/>
              <KV k="Projected portfolio" v={$k(C2.projReal)} vc={onTrack?C.green:C.red} bold/>
              <KV k="Surplus / deficit" v={(C2.surplus>=0?"+":"")+$k(C2.surplus)} vc={C2.surplus>=0?C.green:C.red} bold/>
              <KV k={<><Term>SWR</Term> ({C2.retirementYears}-yr retirement)</>} v={`${C2.durationSWR}% ${C2.durationSWR<p.swr?"(auto-adjusted)":"(your setting)"}`} vc={C2.durationSWR<p.swr?C.orange:C.cyan}/>
              <KV k="Annual expenses at retirement" v={$(C2.totalNeed)} vc={C.muted}/>
              <KV k="Guaranteed income" v={$(C2.guaranteedIncome)+"/yr"} vc={C.green}/>
              <KV k="Portfolio draw needed" v={$(C2.drawNeeded)+"/yr"} vc={C.orange}/>
              <KV k="Max safe monthly draw" v={$(maxDraw)} vc={onTrack?C.green:C.red} bold/>
              <div style={{ marginTop:14 }}>
                <Slider label="🎯 Target Retirement Age" value={p.retAge} onChange={v=>setP({...p,retAge:v})} min={40} max={70} fmt={v=>`Age ${v} · ${toY(v,p.curAge)}`}/>
              </div>
            </div>

            {/* ── MONTHLY CASH FLOW ── */}
            <div style={S.card}>
              <Head title="💵 TODAY'S CASH FLOW"/>
              <KV k="Monthly take-home" v={$(C2.takeHome)} vc={C.green}/>
              {p.hasVA&&<KV k="Non-taxable income" v={$(C2.vaMonthly)+"/mo"} vc={C.green}/>}
              {p.spouseIncome>0&&<KV k="Spouse income" v={$(p.spouseIncome/12)+"/mo"} vc={C.green}/>}
              <KV k="Total monthly income" v={$(C2.totalIncome)} vc={C.green} bold/>
              <div style={{ height:1, background:C.border, margin:"8px 0" }}/>
              <KV k={p.hasMortgage?"Mortgage":"Rent"} v={`(${$(C2.mortMonthly)})`} vc={C.red}/>
              <KV k="Living expenses" v={`(${$(C2.livingMonthly)})`} vc={C.muted}/>
              {C2.monthlyDebtPayments>0&&<KV k="Debt payments" v={`(${$(C2.monthlyDebtPayments)})`} vc={C.orange}/>}
              <KV k="NET CASH FLOW" v={$(C2.cashFlow)} vc={C2.cashFlow>=0?C.cyan:C.red} bold/>
            </div>

            {/* ── SURPLUS ALLOCATION ── */}
            {C2.cashFlow>0&&(
              <div style={{ ...S.card, border:`1px solid ${p.surplusAction==="invest"?"rgba(0,238,255,0.3)":C.border}` }}>
                <Head title="💸 WHAT DO YOU WANT TO DO WITH YOUR SURPLUS?" sub={`You have ${$(C2.cashFlow)}/mo left after all expenses`}/>
                <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                  {[
                    { v:"spend", label:"Spend it", icon:"🛍️", note:"Not included in projections" },
                    { v:"invest", label:"Invest it", icon:"📈", note:"Added to your projection" },
                  ].map(opt=>(
                    <button key={opt.v} onClick={()=>setP({...p, surplusAction:opt.v})} style={{
                      flex:1, padding:"12px 8px", borderRadius:8, cursor:"pointer", textAlign:"center",
                      fontFamily:"'Outfit',sans-serif",
                      background: p.surplusAction===opt.v ? (opt.v==="invest"?"rgba(0,238,255,0.1)":"rgba(244,185,66,0.08)") : "#07101e",
                      border: `1px solid ${p.surplusAction===opt.v ? (opt.v==="invest"?C.cyan:C.gold) : C.border}`,
                      transition:"all 0.2s",
                    }}>
                      <div style={{ fontSize:18, marginBottom:4 }}>{opt.icon}</div>
                      <div style={{ fontSize:12, fontWeight:600, color:p.surplusAction===opt.v?(opt.v==="invest"?C.cyan:C.gold):C.dim }}>{opt.label}</div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{opt.note}</div>
                    </button>
                  ))}
                </div>

                {p.surplusAction==="invest"&&(
                  <div>
                    <div style={{ fontSize:11, color:C.muted, marginBottom:8 }}>Where should it go?</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {[
                        { v:"brokerage", label:"Taxable Brokerage", icon:"📊", note:`${p.growth}% growth · LTCG rates · most flexible` },
                        { v:"roth",      label:"Roth IRA",           icon:"🔵", note:`${p.growth}% growth · Max ${$(rothIRALimit)}/yr · tax-free` },
                        { v:"hsa",       label:"HSA",                icon:"🏥", note:`${p.growth}% growth · triple tax advantage` },
                        { v:"401k",      label:"Extra 401k",         icon:"🏦", note:`${p.growth}% growth · pre-tax · reduces MAGI` },
                        { v:"savings",   label:"Savings Account",    icon:"💵", note:`${RATE_SAVINGS}% growth · HYSA · no market risk` },
                      ].map(opt=>(
                        <button key={opt.v} onClick={()=>setP({...p, surplusAccount:opt.v})} style={{
                          display:"flex", alignItems:"center", gap:12, padding:"10px 14px",
                          borderRadius:8, cursor:"pointer", textAlign:"left",
                          fontFamily:"'Outfit',sans-serif",
                          background: p.surplusAccount===opt.v ? "rgba(0,238,255,0.07)" : "#07101e",
                          border: `1px solid ${p.surplusAccount===opt.v ? C.cyan : C.border}`,
                          transition:"all 0.2s", width:"100%",
                        }}>
                          <span style={{ fontSize:18 }}>{opt.icon}</span>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:12, fontWeight:600, color:p.surplusAccount===opt.v?C.cyan:C.dim }}>{opt.label}</div>
                            <div style={{ fontSize:10, color:C.muted }}>{opt.note}</div>
                          </div>
                          {p.surplusAccount===opt.v&&<span style={{ color:C.cyan, fontSize:14 }}>✓</span>}
                        </button>
                      ))}
                    </div>
                    <div style={{ marginTop:12, padding:"10px 12px", background:"rgba(0,238,255,0.05)", borderRadius:8, border:`1px solid rgba(0,238,255,0.15)` }}>
                      <KV k="Today's monthly surplus" v={$(C2.cashFlow)} vc={C.cyan} bold/>
                      <KV k="Annual (today)" v={$(C2.cashFlow*12)} vc={C.cyan}/>
                      {C2.totalNonMortDebt>0&&<KV k={"After debts clear (~"+C2.debtFreeYear+")"} v={$(C2.cashFlow+C2.monthlyDebtPayments)+"/mo"} vc={C.green} bold/>}
                      <div style={{ fontSize:10, color:C.muted, marginTop:6, lineHeight:1.5 }}>
                        Surplus automatically increases as debts pay off — each freed payment is reinvested in the projection.
                      </div>
                    </div>
                  </div>
                )}

                {p.surplusAction==="spend"&&(
                  <div style={{ padding:"10px 12px", background:"rgba(244,185,66,0.04)", borderRadius:8, border:`1px solid rgba(244,185,66,0.15)`, fontSize:11, color:C.muted, lineHeight:1.6 }}>
                    {$k(C2.cashFlow*12*((Math.pow(1+p.growth/100,C2.ytt)-1)/(p.growth/100)))} would be added to your projected portfolio if invested instead.
                  </div>
                )}
              </div>
            )}
          </div>

          <div>
            {/* ── KEY INSIGHTS ── */}
            {C2.cashFlow>0&&(
              <div style={S.card}>
                {(()=>{
                  const surplus = C2.cashFlow; // monthly
                  const retAge = p.retAge;
                  const rule55 = retAge >= 55 && retAge < 59.5;
                  const mid    = retAge >= 59.5 && retAge < 65;
                  const at65   = retAge >= 65;
                  const early  = retAge < 55;

                  // Current annual contributions
                  const cur401k    = p.salary*(p.trad401kPct+p.roth401kPct)/100/12; // monthly
                  const curMatch   = p.salary*p.empMatchPct/100/12;
                  const matchGap   = Math.max(0, curMatch - cur401k); // how much more needed to capture full match
                  const hsaGap     = Math.max(0, (hsaLimitAnnual - p.hsaAnnual)/12);
                  const rothIRAGap = Math.max(0, (rothIRALimit - p.rothIRAContrib)/12);
                  const k401kGap   = Math.max(0, (k401kLimit - p.salary*(p.trad401kPct+p.roth401kPct)/100)/12);

                  // Build allocation steps based on retirement age strategy
                  const steps = [];
                  let remaining = surplus;
                  const alloc = (label, gap, color, note) => {
                    if(remaining <= 0) return;
                    const amt = Math.min(remaining, gap);
                    if(amt <= 0) return;
                    steps.push({ label, amt, color, note, full: amt >= gap });
                    remaining -= amt;
                  };

                  if(matchGap > 0) alloc("Increase 401k to capture full match", matchGap, C.green, "100% instant return");

                  if(at65) {
                    alloc(`Max HSA (${$(hsaLimitAnnual)}/yr)`, hsaGap, C.purple, "Triple tax advantage");
                    alloc(`Max Roth IRA (${$(rothIRALimit)}/yr)`, rothIRAGap, C.cyan, "Tax-free forever");
                    alloc(`Max 401k (${$(k401kLimit)}/yr)`, k401kGap, C.gold, "Pre-tax growth");
                  } else if(mid) {
                    alloc(`Max Roth IRA (${$(rothIRALimit)}/yr)`, rothIRAGap, C.cyan, "Tax-free, accessible");
                    alloc(`HSA (${$(hsaLimitAnnual)}/yr)`, hsaGap, C.purple, "Pre-Medicare medical costs");
                    alloc(`Max 401k (${$(k401kLimit)}/yr)`, k401kGap, C.gold, "Full access at 59½");
                  } else if(rule55) {
                    alloc(`Roth 401k to 15% total`, Math.max(0, p.salary*0.15/12-cur401k-curMatch), C.cyan, "Rule of 55 bridge");
                    alloc(`HSA (${$(hsaLimitAnnual)}/yr)`, hsaGap, C.purple, "Medical costs pre-Medicare");
                    alloc(`Roth IRA (${$(rothIRALimit)}/yr)`, rothIRAGap, C.cyan, "Supplemental");
                    alloc(`Additional 401k room`, Math.max(0, k401kGap - Math.max(0, p.salary*0.15/12-cur401k-curMatch)), C.gold, "Beyond 15%");
                  } else {
                    alloc(`Max Roth IRA (${$(rothIRALimit)}/yr)`, rothIRAGap, C.cyan, "Most accessible pre-59½");
                    alloc("Taxable brokerage", surplus*0.5, C.gold, "Primary liquid bridge");
                    alloc(`HSA (${$(hsaLimitAnnual)}/yr)`, hsaGap, C.purple, "Medical costs only");
                    alloc(`401k beyond match`, k401kGap, C.muted, "Locked until 55+ or 59½");
                  }

                  if(remaining > 0) steps.push({ label:"Additional brokerage / savings", amt:remaining, color:C.muted, note:"Overflow — no limits", full:false });

                  return <>
                    <Head title="📋 SUGGESTED MONTHLY ALLOCATION" sub={`Based on your ${$(surplus)}/mo surplus and age-${retAge} strategy`}/>
                    {steps.map((s,i)=>(
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 10px", borderRadius:6, marginBottom:4, background:"#07101e", border:`1px solid ${s.full?s.color:C.border}` }}>
                        <div>
                          <div style={{ fontSize:12, color:s.full?s.color:C.dim, fontWeight:s.full?600:400 }}>{s.label}</div>
                          <div style={{ fontSize:10, color:C.muted }}>{s.note}{s.full?" · fully funded":""}</div>
                        </div>
                        <div style={{ ...S.mono, fontSize:14, color:s.color, fontWeight:700 }}>{$(Math.round(s.amt))}<span style={{ fontSize:9, color:C.muted }}>/mo</span></div>
                      </div>
                    ))}
                    {!C2.projReal>=C2.fireNumRealAdj&&(
                      <div style={{ fontSize:10, color:C.orange, marginTop:8, lineHeight:1.5 }}>
                        ⚠ Even fully investing your surplus, you're projected short. Consider increasing income, reducing retirement expenses, or adjusting your retirement age.
                      </div>
                    )}
                  </>;
                })()}
              </div>
            )}

            {/* ── PRE-65 HEALTHCARE PLAN ── */}
            {p.retAge < 65 && (
              <div style={{ ...S.card, border:`1px solid rgba(242,86,112,0.3)` }}>
                <Head title="🏥 PRE-65 HEALTHCARE — YOU NEED A PLAN" color={C.red}
                  sub={`${65-p.retAge} years between retirement and Medicare eligibility`}/>
                <div style={{ fontSize:11, color:C.muted, lineHeight:1.7, marginBottom:12 }}>
                  The HSA is a cost-sharing tool — it is not a health plan. You need a premium-paying plan first, then the HSA covers what the plan doesn't.
                </div>
                {[
                  {
                    title: p.hasVA&&p.vaHealthVet ? "✓ VA Healthcare (Priority Group 2)" : "VA Healthcare",
                    body: p.hasVA&&p.vaHealthVet
                      ? `50%+ rating qualifies you for Priority Group 2 — comprehensive coverage at very low or no cost. This is your best option and eliminates most pre-65 healthcare risk.`
                      : `If you have a 50%+ disability rating, VA healthcare at Priority Group 2 is free or near-free. This single benefit can save $15,000–25,000/yr pre-65. Check your eligibility.`,
                    color: p.hasVA&&p.vaHealthVet ? C.green : C.orange,
                    icon: "🎖️"
                  },
                  {
                    title: "ACA Marketplace Plan (primary option for most)",
                    body: `ACA plans cover pre-existing conditions with no underwriting. Cost depends heavily on your taxable income — VA disability is excluded from MAGI. At low retirement income, subsidies can make premiums $0–300/mo. Enter a realistic premium in Variables → Healthcare. HSA covers your deductible, copays, prescriptions, dental, and vision on top of the plan.`,
                    color: C.cyan,
                    icon: "🏛️"
                  },
                  {
                    title: "HSA — covers costs ON TOP of your plan",
                    body: `HSA pays deductibles ($1,500–7,000/yr typical), copays, prescriptions, dental, vision. It does NOT pay ACA marketplace premiums. With an HDHP plan, pre-65 out-of-pocket costs can be $3–10K/yr — your HSA should be sized to cover this.`,
                    color: C.purple,
                    icon: "💊"
                  },
                  {
                    title: "Spouse's employer plan",
                    body: "If your spouse continues working, joining their employer plan is often the cheapest option. Check whether you'd qualify as a dependent.",
                    color: C.gold,
                    icon: "👥"
                  },
                ].map(({title,body,color,icon})=>(
                  <div key={title} style={{ background:"#07101e", borderRadius:8, padding:"10px 12px", marginBottom:8, borderLeft:`3px solid ${color}` }}>
                    <div style={{ fontSize:12, fontWeight:600, color, marginBottom:4 }}>{icon} {title}</div>
                    <div style={{ fontSize:10, color:C.muted, lineHeight:1.6 }}>{body}</div>
                  </div>
                ))}
                <div style={{ fontSize:10, color:C.muted, marginTop:4, padding:"8px 10px", background:"rgba(242,86,112,0.05)", borderRadius:6 }}>
                  Update your pre-65 monthly premium in <strong style={{color:C.dim}}>Variables → Healthcare</strong> to accurately model this cost in your projection.
                </div>
              </div>
            )}

            <div style={S.card}>
              <Head title="💡 KEY INSIGHTS"/>
              {C2.cashFlow<0&&<Tip icon="⚠️" color={C.red} title="Negative Cash Flow" body={`You're spending ${$(Math.abs(C2.cashFlow))}/mo more than you earn. Address this before increasing investments.`}/>}
              {C2.cashFlow>=0&&C2.cashFlow<500&&<Tip icon="📌" color={C.orange} title="Thin Margins" body={`Only ${$(C2.cashFlow)}/mo surplus. Build a 6-month emergency fund before accelerating investments.`}/>}
              {C2.totalNonMortDebt>0&&<Tip icon="💳" color={C.orange} title="Debt Payoff Accelerates FIRE" body={`When your ${$k(C2.totalNonMortDebt)} in non-mortgage debt clears (~${C2.debtFreeYear}), redirect every freed payment into investments.`}/>}
              {p.hasMortgage&&p.mortRate<4&&<Tip icon="🏠" color={C.green} title="Keep Your Low-Rate Mortgage" body={`Your ${p.mortRate}% mortgage is cheaper than expected investment returns. Never pay it off early — every extra dollar should go to investments.`}/>}
              {p.hasMortgage&&p.mortRate>=6&&<Tip icon="🏠" color={C.orange} title="High Mortgage Rate" body={`At ${p.mortRate}%, extra mortgage payments earn a guaranteed ${p.mortRate}% return. Compare against investing before deciding.`}/>}
              {(p.trad401kPct+p.roth401kPct)<p.empMatchPct&&<Tip icon="🚨" color={C.red} title="Leaving Free Money Behind" body={`Your employer matches up to ${p.empMatchPct}% but you're only contributing ${p.trad401kPct+p.roth401kPct}%. Increase to at least ${p.empMatchPct}% immediately.`}/>}
              {p.hsaAnnual<hsaLimitAnnual&&<Tip icon="💊" color={C.purple} title={<><Term>HSA</Term> — Triple Tax Advantage</>} body={`You're contributing ${$(p.hsaAnnual)}/yr. The limit is ${$(hsaLimitAnnual)}/yr. HSA is the only triple tax-advantaged account — max it before taxable brokerage.`}/>}
              {!p.hasVA&&!p.hasSS&&<Tip icon="📋" color={C.gold} title="Add Guaranteed Income Sources" body="Enable VA Disability and/or Social Security in Variables if applicable. Every $1,000/mo in guaranteed income = ~$300K less you need saved."/>}
              {p.hasVA&&<Tip icon="🎖️" color={C.green} title={`VA = ${$k(C2.vaEquiv)} Portfolio Equivalent (today's $)`} body={`Your ${$(p.vaMonthly)}/mo VA disability (${$(C2.vaAtRet/12)}/mo at age ${p.retAge} after COLA) is worth ${$k(C2.vaEquiv)} in today's dollars. Tax-free, COLA-adjusted, no market risk.`}/>}
              {p.trad401kBal>0&&p.retAge>=55&&<Tip icon="🔄" color={C.cyan} title="Roth Conversion Window" body={`After retiring, your income drops — that's your window. Convert up to ${$(p.filingStatus==="mfj"?STD_DED_MFJ:STD_DED_SINGLE)}/yr from Traditional to Roth at 0% federal tax before RMDs force withdrawals at higher rates.`}/>}
              {onTrack
                ? <Tip icon="✅" color={C.green} title="On Track" body={`Projected surplus of ${$k(C2.surplus)} at retirement. You're building wealth faster than required.`}/>
                : <Tip icon="🎯" color={C.orange} title={`${$k(Math.abs(C2.surplus))} Shortfall`} body="Increase contributions, reduce retirement expenses, or push retirement age to close the gap."/>
              }
              {C2.hcAtRet*12 > C2.totalNeed*0.25 && (
                <Tip icon="🏥" color={C.red} title="Healthcare Driving Costs"
                  body={`Pre-65 healthcare at ${$(C2.hcAtRet)}/mo is ${Math.round(C2.hcAtRet*12/C2.totalNeed*100)}% of your total retirement expenses. Retiring at 65 or qualifying for VA healthcare (50%+ rating) dramatically reduces this.`}/>
              )}
            </div>

            {/* ── WITHDRAWAL ORDER ── */}
            <div style={S.card}>
              <Head title="🏦 WITHDRAWAL ORDER" color={C.cyan} sub="The order you draw from accounts affects taxes, ACA subsidies, and portfolio longevity"/>
              {p.retAge<55&&(
                <div style={{ background:"rgba(242,86,112,0.07)", border:"1px solid rgba(242,86,112,0.35)", borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:C.red, marginBottom:4 }}>⚠ Retiring Before 55 — Key Restrictions</div>
                  <div style={{ fontSize:10, color:C.muted, lineHeight:1.7 }}>
                    <Term>Rule of 55</Term> does NOT apply. <Term>Roth Conversion Ladder</Term> needed for 401k access.<br/>
                    ✓ Accessible: <Term>VA Disability</Term>, <Term>Roth IRA</Term> contributions, brokerage, <Term>HSA</Term> (medical)
                  </div>
                </div>
              )}
              {[
                { n:"1", src:<><Term>VA Disability</Term> · SS · Guaranteed income</>, detail:"Spend this before touching any portfolio. Tax-free, no MAGI impact.", c:C.green },
                { n:"2", src:<>Traditional 401k / TSP — up to standard deduction ({$(p.filingStatus==="mfj"?STD_DED_MFJ:STD_DED_SINGLE)}/yr)</>, detail:`Withdrawals within the standard deduction are federally tax-free. Fill this bracket every year to chip away at Traditional balance and reduce future RMDs.`, c:C.cyan },
                { n:"3", src:<><Term>Roth 401k</Term> / <Term>Roth IRA</Term> — remainder of expenses</>, detail:"Tax-free, no MAGI impact. Preserved for higher-expense years and legacy.", c:C.green },
                { n:"4", src:<><Term>HSA</Term> (medical expenses only)</>, detail:"Triple tax-advantaged. Never pay healthcare from other accounts while HSA has a balance.", c:C.purple },
                { n:"5", src:"Traditional 401k overflow (above standard deduction)", detail:"Taxed at ordinary income rates. Gross up withdrawal to net your needed amount. Avoid if possible — triggers ACA MAGI and higher bracket exposure.", c:C.orange },
                { n:"6", src:"Taxable brokerage", detail:"LTCG rates. Manage for 0% LTCG bracket alongside Traditional draws. Flexible for large one-time expenses.", c:C.gold },
              ].map(({ n,src,detail,c })=>(
                <div key={n} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                  <div style={{ ...S.mono, fontSize:14, color:c, fontWeight:700, minWidth:18 }}>{n}</div>
                  <div>
                    <div style={{ fontSize:12, color:C.text, fontWeight:500 }}>{src}</div>
                    <div style={{ fontSize:10, color:C.muted, marginTop:2, lineHeight:1.5 }}>{detail}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* ── PRIORITY LIST ── */}
            <div style={S.card}>
              {(()=>{
                const retAge = p.retAge;
                const yrsLeft = Math.max(0, retAge - p.curAge);
                const onTrackLocal = C2.projReal >= C2.fireNumRealAdj;
                const fireGap = C2.fireNumRealAdj - C2.projReal;
                const fireContext = onTrackLocal
                  ? `You're projected to have ${$k(C2.projReal)} vs a FIRE number of ${$k(C2.fireNumRealAdj)} — on track with ${$k(C2.surplus)} to spare.`
                  : `You need ${$k(C2.fireNumRealAdj)} — currently projecting ${$k(C2.projReal)}. Gap: ${$k(fireGap)}. Prioritize accordingly.`;

                // Age ranges
                const sub65    = retAge >= 65;
                const mid      = retAge >= 59.5 && retAge < 65;
                const rule55   = retAge >= 55 && retAge < 59.5;
                const early    = retAge < 55;

                const label = sub65    ? "Retiring at 65+ · Access to all accounts · Medicare eligible"
                            : mid      ? "Retiring 59½–65 · Full account access · Pre-Medicare"
                            : rule55   ? "Retiring 55–59½ · Rule of 55 is your bridge"
                            :            "Retiring before 55 · Liquidity is everything";

                const items = sub65 ? [
                  { n:1, a:"Emergency fund (3–6 months)", w:"Non-negotiable foundation. Keeps you from liquidating investments in a downturn.", c:C.gold },
                  { n:2, a:"Capture full employer 401k match", w:`Free money — 100% instant return. ${$(p.salary*p.empMatchPct/100)}/yr at your current match rate.`, c:C.cyan },
                  { n:3, a:`Max HSA (${$(hsaLimitAnnual)}/yr)`, w:`At 65 HSA becomes the best account in the tax code — Medicare premiums, dental, vision, and any expense taxed like Traditional (but medical stays tax-free forever). Triple tax advantage. Max every year.`, c:C.purple },
                  { n:4, a:`Max Roth IRA + Roth 401k (${$(rothIRALimit + k401kLimit)}/yr combined)`, w:`Tax-free growth with no RMDs. Roth 401k: ${$(k401kLimit)}/yr. Roth IRA: ${$(rothIRALimit)}/yr.${p.curAge>=60&&p.curAge<=63?" Super catch-up applies to 401k.":p.curAge>=50?" Catch-up eligible on both.":""}`, c:C.cyan },
                  { n:5, a:`Traditional 401k beyond Roth capacity`, w:`Pre-tax reduces your taxable income now. Manage withdrawals in retirement to stay in low brackets using the standard deduction strategy.`, c:C.gold },
                  { n:6, a:"Taxable brokerage with remaining surplus", w:"No limits, no restrictions. LTCG rates. Full flexibility.", c:C.muted },
                ] : mid ? [
                  { n:1, a:"Emergency fund (3–6 months)", w:"Non-negotiable foundation.", c:C.gold },
                  { n:2, a:"Capture full employer 401k match", w:`Free money — 100% instant return. ${$(p.salary*p.empMatchPct/100)}/yr at your current match rate.`, c:C.cyan },
                  { n:3, a:`Max Roth IRA (${$(rothIRALimit)}/yr)`, w:`Open now to start the 5-year clock (satisfies ${p.rothIRAOpenYear+5}). Contributions accessible anytime penalty-free. After 59½ earnings are also tax-free.${p.curAge>=50?" Catch-up eligible.":""}`, c:C.cyan },
                  { n:4, a:`Max HSA (${$(hsaLimitAnnual)}/yr)`, w:`Critical for the pre-Medicare gap. Covers deductibles, copays, dental, vision, prescriptions — all the expenses your ACA plan doesn't. After 65: Medicare premiums qualify too. Every dollar here is triple tax-advantaged.`, c:C.purple },
                  { n:5, a:`Max Roth 401k (${$(k401kLimit)}/yr)`, w:`Tax-free at withdrawal. Full access at 59½. Keep in employer plan — rolling to IRA before then only matters for Rule of 55 which doesn't apply at this age range.${p.curAge>=50?" Catch-up eligible.":""}`, c:C.cyan },
                  { n:6, a:"Taxable brokerage with remaining surplus", w:"No limits. LTCG rates. Flexible bridge for any gaps before 59½.", c:C.muted },
                ] : rule55 ? [
                  { n:1, a:"Emergency fund (3–6 months)", w:"Non-negotiable. One bad year without this and you're forced to liquidate at the worst time.", c:C.gold },
                  { n:2, a:"Capture full employer 401k match", w:`Free money — 100% instant return. ${$(p.salary*p.empMatchPct/100)}/yr at your current match rate.`, c:C.cyan },
                  { n:3, a:`Roth 401k — up to 15% total 401k contributions`, w:`Rule of 55: separate from employer at 55 → full 401k penalty-free immediately. Keep in employer plan — do NOT roll to IRA before 59½ or you lose this. Roth 401k preferred over Traditional for tax-free access. 15% total gives the match plus meaningful Roth accumulation.`, c:C.cyan },
                  { n:4, a:`HSA (${$(hsaLimitAnnual)}/yr) — your pre-Medicare medical fund`, w:`Deductibles, copays, prescriptions, dental, vision — all tax-free. ACA plans pre-65 can have $3–7K/yr in out-of-pocket costs. HSA covers this without touching your portfolio. Keep every medical receipt — reimburse yourself years later if needed.`, c:C.purple },
                  { n:5, a:`Open Roth IRA + contribute what you can`, w:`Start the 5-year clock if not already (satisfies ${p.rothIRAOpenYear+5}). Contributions accessible anytime. Supplemental to your 401k bridge — don't rely on basis alone unless you've been maxing for years.`, c:C.cyan },
                  { n:6, a:"Traditional 401k if more 401k room remains", w:"Pre-tax now, taxed at withdrawal. Use standard deduction strategy in retirement to draw tax-free up to bracket limit.", c:C.gold },
                  { n:7, a:"Taxable brokerage with remaining surplus", w:"No limits, full flexibility. Good overflow vehicle if 401k + HSA are maxed.", c:C.muted },
                ] : [
                  { n:1, a:"Emergency fund (6 months minimum)", w:"Early retirement demands a larger cushion — sequence of returns risk is highest in the first 5 years.", c:C.gold },
                  { n:2, a:"Capture full employer 401k match", w:`Free money — always capture this regardless of retirement age. ${$(p.salary*p.empMatchPct/100)}/yr at your current match rate.`, c:C.cyan },
                  { n:3, a:`Max Roth IRA (${$(rothIRALimit)}/yr) — open immediately`, w:`Start the 5-year clock today. Satisfies ${p.rothIRAOpenYear+5}. Contributions (not earnings) accessible anytime penalty-free — critical liquid bridge before 59½. Track your contribution basis carefully.${p.curAge>=50?" Catch-up eligible.":""}`, c:C.cyan },
                  { n:4, a:"Taxable brokerage — your primary liquid bridge", w:"No age restrictions, no penalties, no limits. LTCG rates. For retiring before 55 this is your main income source until penalty-free retirement account access kicks in. Prioritize this over HSA if cash flow is tight.", c:C.gold },
                  { n:5, a:`HSA (${$(hsaLimitAnnual)}/yr) — medical costs only`, w:`Can't pay ACA premiums (only COBRA or Medicare qualify). Can pay deductibles, copays, dental, vision, prescriptions. Pre-65 medical costs can be $5-10K/yr out of pocket. Contribute for expected medical spend only — don't lock up money you'll need for living expenses.`, c:C.purple },
                  { n:6, a:"Roth 401k contributions beyond match", w:"Tax-free at 59½. Rule of 55 doesn't help you — you'll need the Roth conversion ladder. Start conversions 5 years before you need the money.", c:C.muted },
                  { n:7, a:"Start Roth conversion ladder immediately at retirement", w:"Convert Traditional 401k → Roth IRA each year in low-income retirement years. Each conversion accessible penalty-free after 5 years. Bridge with brokerage and Roth contributions during the wait.", c:C.cyan },
                ];

                return <>
                  <Head title="✅ CONTRIBUTION PRIORITY ORDER" sub={label}/>
                  <div style={{ background:"rgba(0,238,255,0.05)", border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", marginBottom:12, fontSize:10, color:C.muted, lineHeight:1.6 }}>
                    {fireContext}
                  </div>
                  {items.map(({ n,a,w,c })=>(
                    <div key={n} style={{ display:"flex", gap:10, padding:"7px 0", borderBottom:`1px solid ${C.border}` }}>
                      <div style={{ ...S.mono, fontSize:14, color:c, fontWeight:700, minWidth:18 }}>{n}</div>
                      <div>
                        <div style={{ fontSize:12, color:C.text, fontWeight:500 }}>{a}</div>
                        <div style={{ fontSize:10, color:C.muted, marginTop:1, lineHeight:1.4 }}>{w}</div>
                      </div>
                    </div>
                  ))}
                </>;
              })()}
            </div>
          </div>
        </div>


        <div style={{ textAlign:"center", marginTop:20 }}>
          <button onClick={()=>setPage(2)} style={{ padding:"12px 32px", borderRadius:8, border:"none", cursor:"pointer", background:`linear-gradient(135deg,${C.cyanDim},${C.cyan})`, color:"#000", fontFamily:"'Outfit',sans-serif", fontSize:13, fontWeight:600 }}>
            View Projection Chart →
          </button>
        </div>
      </div>
    );
  };

  /* ════════════════════════════════════
     PAGE 2 — PROJECTION + SCENARIOS
  ════════════════════════════════════ */
  const Page2 = () => {
    const onTrack = C2.projReal >= C2.fireNumRealAdj;
    const drawMo = C2.drawNeeded / 12;
    const maxDraw = C2.monthlyDraw;

    // Define scenarios
    const SLIDER_ID = 4;
    const scenarios = [
      { id:0, label:"+2% 401k", icon:"📈", desc:"Increase 401k contribution by 2% of salary", mod:q=>({...q, roth401kPct:q.roth401kPct+2}) },
      { id:1, label:"+$500/mo HSA", icon:"🏥", desc:"Add $500/month more to HSA", mod:q=>({...q, hsaAnnual:q.hsaAnnual+6000}) },
      { id:2, label:"Retire 2 yrs later", icon:"⏳", desc:`Retire at age ${p.retAge+2} instead of ${p.retAge}`, mod:q=>({...q, retAge:q.retAge+2}) },
      { id:3, label:"+$200/mo brokerage", icon:"💰", desc:"Add $200/month to taxable brokerage", mod:q=>({...q, monthlyBrokerageContrib:q.monthlyBrokerageContrib+200}) },
      { id:SLIDER_ID, label:"Retire at age...", icon:"🎯", desc:"Drag the slider to explore any retirement age", mod:q=>({...q, retAge:scenarioRetAge||q.retAge}) },
    ];

    // Initialize slider age when scenario 4 selected
    const sliderAge = scenarioRetAge || p.retAge;

    // Compute scenario projection inline
    const computeScenarioProj = (mod) => {
      const q = mod(p);
      const yrsQ = Math.max(0, q.retAge - q.curAge);
      let proj = C2.totalInvested;
      const hsaForYrQ = yr => (q.hsaAnnual||0) + (q.hsaEmployer||0);

      // Shared surplus helper — mirrors yearlySurplus but uses q instead of p
      const qSurplus = (yrs) => {
        if(q.surplusAction !== "invest") return { ret:0, brok:0 };
        const sal = q.salary*Math.pow(1+q.salaryGrowth/100,yrs);
        const preTax2 = sal*(q.trad401kPct/100)+q.hsaAnnual+q.hcPremiumPerPaycheck*PAYCHECKS_YR;
        const agi2 = Math.max(0,sal-preTax2);
        const qMfj=q.filingStatus==="mfj"; const { tax: fedTax2 } = calcTax(Math.max(0,agi2-(qMfj?STD_DED_MFJ:STD_DED_SINGLE)), qMfj);
        const take2=(sal-preTax2-sal*(q.roth401kPct/100)-sal*FICA_RATE-fedTax2-agi2*(q.stateTax/100))/12;
        const inc2=take2+(q.hasVA?q.vaMonthly:0)+(q.spouseIncome/12);
        const d1=q.debt1Bal>0&&yrs*12<C2.debt1.months?q.debt1Monthly:0;
        const d2=q.debt2Bal>0&&yrs*12<C2.debt2.months?q.debt2Monthly:0;
        const d3=q.debt3Bal>0&&yrs*12<C2.debt3.months?q.debt3Monthly:0;
        const flow=Math.max(0,inc2-q.mortTotal-C2.livingMonthly-d1-d2-d3);
        const toRet=q.surplusAccount==="401k"; const toRoth=q.surplusAccount==="roth"; const toHsa=q.surplusAccount==="hsa"; const toSav=q.surplusAccount==="savings"; const toBrok=q.surplusAccount==="brokerage";
        return { ret:toRet?flow*12:0, roth:toRoth?flow*12:0, hsa:toHsa?flow*12:0, brok:toBrok?flow*12:0, sav:toSav?flow*12:0 };
      };

      for(let i=0;i<yrsQ;i++){
        const yr=CY+i, sal=q.salary*Math.pow(1+q.salaryGrowth/100,i);
        const loanRepay=(q.debt3Bal>0&&i*12<C2.debt3.months)?q.debt3Monthly*12:0;
        const s=qSurplus(i);
        proj=proj*(1+q.growth/100)+sal*((q.trad401kPct+q.roth401kPct+q.empMatchPct+q.empBasePct)/100)+hsaForYrQ(yr)+q.rothIRAContrib+q.monthlyBrokerageContrib*12+loanRepay+s.ret+s.brok;
      }
      const infM = Math.pow(1+q.inflation/100,yrsQ);
      const retYrs = q.planAge - q.retAge;
      const swr = retYrs>=50?Math.min(q.swr,3.0):retYrs>=45?Math.min(q.swr,3.25):retYrs>=40?Math.min(q.swr,3.5):retYrs>=35?Math.min(q.swr,3.75):q.swr;
      const vaQ = q.hasVA ? q.vaMonthly*12*Math.pow(1+q.vaCola/100,yrsQ) : 0;
      const ssQ = q.hasSS&&q.ssAge<=q.retAge ? q.ssMonthly*12*infM : 0;
      const baseNoHousing = q.hasMortgage ? (C2.livingMonthly-q.propTax-q.homeInsurance)*12*(q.retRatio/100)*infM : (C2.livingMonthly-q.homeInsurance)*12*(q.retRatio/100)*infM;
      const housingInfl = q.hasMortgage ? (q.propTax+q.homeInsurance)*12*Math.pow(1+q.inflation/100*1.5,yrsQ)*(q.retRatio/100) : 0;
      const livQ = baseNoHousing+housingInfl;
      const extQ = q.retExtras*12*infM;
      const mortQ = q.hasMortgage ? ((CY+yrsQ)<=q.mortPayoff ? q.mortTotal*12 : 0) : q.mortTotal*12;
      // Use makeHcMonthly so Medicare transition at 65 is correctly handled
      const hcQ = makeHcMonthly(q)(q.retAge, 0) * 12;
      const drawQ = Math.max(0,livQ+extQ+mortQ+hcQ-vaQ-ssQ);
      const fireQ = drawQ/(swr/100);
      const penQ = q.retAge<55?1+PRE55_PENALTY*PRE55_PARTIAL:1;
      const fireQReal = (fireQ/infM)*penQ;
      const projReal = proj/infM;
      const surplus = projReal-fireQReal;
      const monthlyDraw = proj*swr/100/12;
      return { proj, projReal, fireQReal, surplus, monthlyDraw, retAge:q.retAge, swr };
    };

    const activeScenario = scenarioIdx !== null ? computeScenarioProj(scenarios[scenarioIdx].mod) : null;

    // Scenario chart — delegates to the same runSimulation engine as the main projection
    const computeScenarioChart = (mod) => {
      const q = mod(p);
      const qMfj = q.filingStatus === "mfj";
      const qLivingMonthly = q.electric+q.water+q.phone+q.internet+q.food+q.carInsurance+q.gasMonthly+q.other+q.propTax+q.homeInsurance;
      const qHcFn = makeHcMonthly(q);

      // Build a surplus function for q using the same logic as yearlySurplus
      const qDebtPayoff = (bal, rate, monthly) => {
        if(bal <= 0 || monthly <= 0) return { months: 0 };
        if(rate <= 0) return { months: Math.ceil(bal/monthly) };
        const r = rate/100/12;
        return { months: Math.ceil(-Math.log(1-r*bal/monthly)/Math.log(1+r)) };
      };
      const qD1 = qDebtPayoff(q.debt1Bal, q.debt1Rate, q.debt1Monthly);
      const qD2 = qDebtPayoff(q.debt2Bal, q.debt2Rate, q.debt2Monthly);
      const qD3 = qDebtPayoff(q.debt3Bal, q.debt3Rate, q.debt3Monthly);

      const qSurplusFn = (yrs) => {
        if(q.surplusAction !== "invest") return { ret:0, brok:0 };
        const sal = q.salary*Math.pow(1+q.salaryGrowth/100,yrs);
        const preTax2 = sal*(q.trad401kPct/100)+q.hsaAnnual+q.hcPremiumPerPaycheck*PAYCHECKS_YR;
        const agi2 = Math.max(0,sal-preTax2);
        const { tax: fedTax2 } = calcTax(Math.max(0,agi2-(qMfj?STD_DED_MFJ:STD_DED_SINGLE)), qMfj);
        const take2 = (sal-preTax2-sal*(q.roth401kPct/100)-sal*FICA_RATE-fedTax2-agi2*(q.stateTax/100))/12;
        const inc2  = take2+(q.hasVA?q.vaMonthly:0)+(q.spouseIncome/12);
        const d1 = q.debt1Bal>0&&yrs*12<qD1.months?q.debt1Monthly:0;
        const d2 = q.debt2Bal>0&&yrs*12<qD2.months?q.debt2Monthly:0;
        const d3 = q.debt3Bal>0&&yrs*12<qD3.months?q.debt3Monthly:0;
        const flow = Math.max(0,inc2-q.mortTotal-qLivingMonthly-d1-d2-d3);
        const toRet=q.surplusAccount==="401k"; const toRoth=q.surplusAccount==="roth"; const toHsa=q.surplusAccount==="hsa"; const toSav=q.surplusAccount==="savings"; const toBrok=q.surplusAccount==="brokerage";
        return { ret:toRet?flow*12:0, roth:toRoth?flow*12:0, hsa:toHsa?flow*12:0, brok:toBrok?flow*12:0, sav:toSav?flow*12:0 };
      };

      const { data } = runSimulation(q, qLivingMonthly, qHcFn, qSurplusFn,
        { d1:qD1.months, d2:qD2.months, d3:qD3.months }, q.retAge);
      return data;
    };
    const scenarioChartData = scenarioIdx !== null ? computeScenarioChart(scenarios[scenarioIdx].mod) : null;

    return (
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 20px" }}>

        {/* ── MONTHLY DRAW HIGHLIGHT ── */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:16 }}>
          <div style={{ ...S.card, textAlign:"center", padding:"16px" }}>
            <div style={{ fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted, marginBottom:4 }}>Portfolio draw/month</div>
            <div style={{ ...S.mono, fontSize:22, fontWeight:700, color:C.cyan }}>{$(C2.monthlyDraw)}</div>
            <div style={{ fontSize:10, color:C.muted }}>At {C2.durationSWR}% SWR · age {p.retAge}</div>
          </div>
          <div style={{ ...S.card, textAlign:"center", padding:"16px", border:`1px solid ${onTrack?C.green:"rgba(242,86,112,0.4)"}` }}>
            <div style={{ fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted, marginBottom:4 }}>{onTrack?"Surplus":"Shortfall"}</div>
            <div style={{ ...S.mono, fontSize:22, fontWeight:700, color:onTrack?C.green:C.red }}>{(C2.surplus>=0?"+":"")+$k(C2.surplus)}</div>
            <div style={{ fontSize:10, color:C.muted }}>Today's dollars at age {p.retAge}</div>
          </div>
          <div style={{ ...S.card, textAlign:"center", padding:"16px", background:"rgba(183,139,250,0.05)", border:`1px solid rgba(183,139,250,0.25)` }}>
            <div style={{ fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted, marginBottom:4 }}>HSA at retirement</div>
            <div style={{ ...S.mono, fontSize:22, fontWeight:700, color:C.purple }}>{$k(p.hsa*Math.pow(1+p.growth/100,C2.ytt)+((p.hsaAnnual+p.hsaEmployer)*((Math.pow(1+p.growth/100,C2.ytt)-1)/(p.growth/100))))}</div>
            <div style={{ fontSize:10, color:C.muted }}>Medical reserve · not included in portfolio draw</div>
          </div>
        </div>

        {/* ── SCENARIOS ── */}
        <div style={S.card}>
          <Head title="🔀 WHAT IF SCENARIOS" sub="Select a scenario to compare against your base projection"/>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
            {scenarios.map(s=>(
              <button key={s.id} onClick={()=>{ setScenarioIdx(scenarioIdx===s.id?null:s.id); if(s.id===SLIDER_ID&&!scenarioRetAge) setScenarioRetAge(p.retAge); }} style={{
                padding:"8px 16px", borderRadius:8, cursor:"pointer",
                fontFamily:"'Outfit',sans-serif", fontSize:12, fontWeight:500,
                background: scenarioIdx===s.id ? "rgba(244,185,66,0.15)" : C.card,
                color: scenarioIdx===s.id ? C.gold : C.dim,
                border: `1px solid ${scenarioIdx===s.id?"rgba(244,185,66,0.4)":C.border}`,
                transition:"all 0.2s",
              }}>{s.icon} {s.label}</button>
            ))}
            {scenarioIdx!==null&&(
              <button onClick={()=>{setScenarioIdx(null);setScenarioRetAge(null);}} style={{ padding:"8px 16px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:12, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>
                ✕ Clear
              </button>
            )}
          </div>

          {/* Interactive retirement age slider */}
          {scenarioIdx===SLIDER_ID&&(
            <div style={{ marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <div style={{ fontSize:12, color:C.dim }}>🎯 Retire at age <span style={{ ...S.mono, fontSize:16, fontWeight:700, color:C.gold }}>{sliderAge}</span> <span style={{ fontSize:11, color:C.muted }}>({toY(sliderAge,p.curAge)} · {sliderAge-p.curAge} yrs away)</span></div>
                <div style={{ fontSize:11, color:C.muted }}>Base: age {p.retAge}</div>
              </div>
              <input type="range" min={40} max={72} value={sliderAge}
                onChange={e=>setScenarioRetAge(parseInt(e.target.value))}
                style={{ width:"100%", accentColor:C.gold }}/>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:C.muted, marginTop:2 }}>
                <span>40</span><span>50</span><span>60</span><span>70</span>
              </div>
            </div>
          )}

          {scenarioIdx===null&&(
            <div style={{ fontSize:11, color:C.muted, textAlign:"center", padding:"16px 0" }}>
              Select a scenario above to overlay it on the projection chart
            </div>
          )}

          {activeScenario&&(
            <div>
              <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>
                {activeScenario.surplus >= 0
                  ? <span style={{ color:C.green }}>✅ Your portfolio supports <span style={{ ...S.mono }}>{$(activeScenario.monthlyDraw)}/month</span> through retirement.</span>
                  : <span style={{ color:C.orange }}>⚠️ Shortfall of <span style={{ ...S.mono }}>{$k(Math.abs(activeScenario.surplus))}</span> — portfolio does not meet FIRE number.</span>
                }
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
                {[
                  { label:"Portfolio at ret.", base:$k(C2.projReal), scenario:$k(activeScenario.projReal), delta:activeScenario.projReal-C2.projReal },
                  { label:"FIRE Number", base:$k(C2.fireNumRealAdj), scenario:$k(activeScenario.fireQReal), delta:C2.fireNumRealAdj-activeScenario.fireQReal, lowerIsBetter:true },
                  { label:"Surplus/Deficit", base:$k(C2.surplus), scenario:$k(activeScenario.surplus), delta:activeScenario.surplus-C2.surplus },
                  { label:"Monthly draw", base:$(C2.monthlyDraw), scenario:$(activeScenario.monthlyDraw), delta:activeScenario.monthlyDraw-C2.monthlyDraw },
                ].map(({ label,base,scenario,delta,lowerIsBetter })=>(
                  <div key={label} style={{ background:"#07101e", borderRadius:6, padding:"8px 10px" }}>
                    <div style={{ fontSize:10, color:C.muted, marginBottom:4 }}>{label}</div>
                    <div style={{ ...S.mono, fontSize:11, color:C.dim }}>Base: {base}</div>
                    <div style={{ ...S.mono, fontSize:11, color:C.gold }}>New: {scenario}</div>
                    <div style={{ ...S.mono, fontSize:12, color:(lowerIsBetter?delta>0:delta>0)?C.green:delta<0?C.red:C.muted, fontWeight:600, marginTop:2 }}>
                      {delta>0?"+":""}{Math.abs(delta)>1000?$k(delta):$(delta)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* ── MAIN CHART ── */}
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:10 }}>
            <div>
              <div style={{ fontSize:14, fontWeight:600, color:C.cyan }}>
                PORTFOLIO PROJECTION — RETIRING AGE {p.retAge} ({toY(p.retAge,p.curAge)})
                {activeScenario&&<span style={{ color:C.gold, marginLeft:8 }}>· {scenarios[scenarioIdx].label} overlay</span>}
              </div>
              <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{p.growth}% growth · {p.inflation}% inflation · {C2.durationSWR}% SWR · Age {p.curAge} → {p.planAge}</div>
            </div>
            <div style={{ ...S.mono, fontSize:12 }}>
              {onTrack
                ? <span style={{ color:C.green }}>✓ ON TRACK — {$k(C2.surplus)} surplus</span>
                : <span style={{ color:C.red }}>⚠ {$k(Math.abs(C2.surplus))} shortfall</span>}
            </div>
          </div>
          <ResponsiveAreaChart
            data={C2.chart}
            retAge={p.retAge}
            ssAge={p.hasSS?p.ssAge:null}
            fireNum={C2.fireNum}
            hasMortgage={p.hasMortgage}
            mortPayoffAge={p.curAge+Math.ceil(C2.mort.months/12)}
            curAge={p.curAge}
            scenarioData={scenarioChartData}
            scenarioRetAge={scenarioIdx===SLIDER_ID?sliderAge:activeScenario?.retAge}
          />
          <div style={{ display:"flex", gap:20, flexWrap:"wrap", marginTop:10 }}>
            {[
              { color:C.cyan, label:"Base projection", line:true },
              ...(scenarioChartData?[{ color:C.gold, label:scenarioIdx===SLIDER_ID?`Age ${sliderAge} scenario`:scenarios[scenarioIdx]?.label, dash:true }]:[]),
              { color:C.gold, label:"Retirement age", vert:true },
              { color:C.green, label:"Medicare (65)", vert:true },
              { color:C.gold, label:"FIRE # threshold", dash:true },
            ].map(({ color,label,dash })=>(
              <div key={label} style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ width:20, height:2, background:color, opacity:0.9, borderTop:dash?`2px dashed ${color}`:"none", marginTop:1 }}/>
                <span style={{ fontSize:10, color:C.muted }}>{label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ── RETIREMENT INCOME vs EXPENSES ── */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          <div style={S.card}>
            <Head title={`🧾 EXPENSES AT AGE ${p.retAge}`} sub={`Future dollars · ${p.inflation}% inflation · ${C2.ytt} years from now`} color={C.red}/>
            {(()=>{
              const inf = Math.pow(1+p.inflation/100, C2.ytt);
              const housingInf = Math.pow(1+p.inflation/100*1.5, C2.ytt);
              const BRow = ({ label, ann, color, bold, note }) => (
                <div style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${C.border}` }}>
                  <div>
                    <span style={{ fontSize:12, color:bold?C.dim:C.muted }}>{label}</span>
                    {note&&<div style={{ fontSize:9, color:C.muted }}>{note}</div>}
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ ...S.mono, fontSize:12, color:color||C.text, fontWeight:bold?600:400 }}>{$(ann/12)}<span style={{ fontSize:9, color:C.muted }}>/mo</span></div>
                    <div style={{ fontSize:9, color:C.muted }}>{$(ann)}/yr</div>
                  </div>
                </div>
              );
              const mortAnn = p.hasMortgage ? ((CY+C2.ytt)<=p.mortPayoff ? p.mortTotal*12 : 0) : p.mortTotal*12;
              const hcPre65 = C2.hcAtRet;
              // Homeowners: strip propTax+insurance from living, inflate separately at housing rate
              // Renters: rent is already in mortAnn (inflated at standard rate), no propTax
              const propAndIns = p.hasMortgage ? (p.propTax+p.homeInsurance)*12*housingInf*(p.retRatio/100) : 0;
              const baseNoHousing = p.hasMortgage
                ? (C2.livingMonthly-p.propTax-p.homeInsurance)*12*(p.retRatio/100)*inf
                : (C2.livingMonthly-p.homeInsurance)*12*(p.retRatio/100)*inf; // renters: exclude homeInsurance (renter's ins minimal, already in living)
              const totalLiving = baseNoHousing + propAndIns + p.retExtras*12*inf;
              const totalAnn = totalLiving + mortAnn + hcPre65;
              return <>
                {p.hasMortgage
                  ? <BRow label="Mortgage" ann={mortAnn} color={mortAnn>0?C.orange:C.green} bold note={mortAnn>0?`Active until ${p.mortPayoff}`:"Paid off ✓"}/>
                  : <BRow label="Rent" ann={mortAnn} color={C.orange} bold note="Inflates with general inflation"/>
                }
                {p.hasMortgage && (
                  <BRow label="Property tax + insurance" ann={propAndIns} color={C.orange} note={`Inflates at ${(p.inflation*1.5).toFixed(1)}%/yr`}/>
                )}
                <BRow label={`Healthcare (pre-65${p.filingStatus==="mfj"?" · couple":" · individual"})`} ann={hcPre65} color={C.red} bold note={`Post-65 Medicare: ${$(p.post65HC*(p.filingStatus==="mfj"?2:1))}/mo ${p.filingStatus==="mfj"?"couple":"individual"} · $${p.post65HC}/person`}/>

            // FPL projected to retirement year

            const fpl = fpl2026 * genInf;

            // Unsubsidized premium projected to retirement year
            const unsubBase2026 = (p.hasVA&&p.vaHealthVet ? p.vetHC : p.selfHC) + (married ? p.spouseHC : 0);
            const unsubBase = unsubBase2026 * hcInf;

            // ACA subsidy calculation — income is in future dollars, FPL is in future dollars
            const calcACA = (incomeToday) => {
              // Convert today's income to future dollars for FPL comparison
              const incomeFuture = incomeToday * genInf;
              if(incomeFuture <= 0) return { premium: unsubBase, subsidy: 0, note: "Medicaid eligible" };
              const fplPct = incomeFuture / fpl * 100;
              if(fplPct > 400) return { premium: unsubBase, subsidy: 0, note: "No subsidy >400% FPL" };
              let reqPct;
              if(fplPct <= 133)       reqPct = 0.0206;
              else if(fplPct <= 150)  reqPct = 0.0309 + (fplPct-133)/(150-133)*(0.0412-0.0309);
              else if(fplPct <= 200)  reqPct = 0.0412 + (fplPct-150)/(200-150)*(0.0618-0.0412);
              else if(fplPct <= 250)  reqPct = 0.0618 + (fplPct-200)/(250-200)*(0.0824-0.0618);
              else if(fplPct <= 300)  reqPct = 0.0824 + (fplPct-250)/(300-250)*(0.1030-0.0824);
              else                    reqPct = 0.1030;
              const maxContrib = incomeFuture * reqPct / 12;
              const subsidy = Math.max(0, unsubBase - maxContrib);
              const premium = Math.max(0, unsubBase - subsidy);
              return { premium, subsidy, incomeFuture, fplPct };
            };

            // Income rows in today's dollars — user thinks in today's money
            const incomes = [0,15000,25000,40000,50000,63000,75000,100000,150000,200000,250000];
            // Subsidy cliff in today's dollars

                  </div>
                  <div style={{ fontSize:10, color:C.muted, lineHeight:1.5 }}>
                    Income above this in retirement eliminates all subsidies. Managing Roth conversions and capital gains below this threshold
                    saves {$(unsubBase - calcACA(fpl400Today-1).premium)}/mo at age {p.retAge}.
                    {p.hasVA&&<span style={{ color:C.green }}> VA disability excluded from MAGI — doesn't count toward this limit.</span>}
                  </div>
                </div>

                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                    <thead>
                      <tr style={{ borderBottom:`1px solid ${C.border}` }}>
                        {[
                          `Income (today's $)`,
                          `Income (age ${p.retAge} $)`,
                          "FPL %",
                          `Premium at age ${p.retAge}`,
                          "Monthly subsidy",
                          `Annual savings`
                        ].map(h=>(
                          <th key={h} style={{ padding:"6px 8px", textAlign:"left", color:C.muted, fontWeight:500, fontSize:10 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {incomes.map(inc=>{
                        const r = calcACA(inc);
                        const saving = unsubBase - r.premium;
                        const rowColor = r.subsidy > 0 ? "rgba(34,199,122,0.04)" : "transparent";
                        const isCliff = inc > 0 && calcACA(inc-1).subsidy > 0 && r.subsidy === 0;
                        return (
                          <tr key={inc} style={{ borderBottom:`1px solid ${isCliff?"rgba(242,86,112,0.4)":C.border}`, background:rowColor }}>
                            <td style={{ ...S.mono, padding:"6px 8px", color:C.text, fontWeight:500 }}>{inc===0?"$0":$(inc)}</td>

                            <td style={{ ...S.mono, padding:"6px 8px", color:r.subsidy>0?C.green:C.muted }}>{r.subsidy>0?$(r.subsidy)+"/mo":"—"}</td>
                            <td style={{ ...S.mono, padding:"6px 8px", color:saving>0?C.green:C.muted }}>{saving>0?$k(saving*12)+"/yr":"—"}</td>
                          </tr>
