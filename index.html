<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useRef } = React;


/* ── Tokens ── */
const C = {
  bg:"#060b14", card:"#0c1322", border:"#162035",
  text:"#dde6f0", muted:"#4a6080", dim:"#7a94b0",
  cyan:"#0ef", cyanDim:"#0bbbd4", cyanGlow:"rgba(0,238,255,0.12)",
  gold:"#f4b942", green:"#22c77a", red:"#f25670", purple:"#b78bfa", orange:"#f0a050",
};

const S = {
  body:  { background:C.bg, minHeight:"100vh", fontFamily:"'Outfit',sans-serif", color:C.text, padding:0 },
  header:{ background:"linear-gradient(135deg,#060f1e 0%,#0a1628 50%,#060f1e 100%)", borderBottom:`1px solid ${C.border}`, padding:"20px 28px 16px", position:"sticky", top:48, zIndex:100 },
  card:  { background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"20px 24px", marginBottom:16 },
  label: { fontSize:10, fontWeight:700, letterSpacing:"0.13em", textTransform:"uppercase", color:C.muted, display:"block", marginBottom:5 },
  mono:  { fontFamily:"'JetBrains Mono',monospace" },
  serif: { fontFamily:"'Cormorant Garamond',serif" },
  inp:   { background:"#080e1a", border:`1px solid ${C.border}`, borderRadius:7, color:C.text, padding:"7px 11px", width:"100%", fontFamily:"'JetBrains Mono',monospace", fontSize:13, outline:"none", boxSizing:"border-box" },
  tab:   (a) => ({ padding:"7px 14px", borderRadius:7, cursor:"pointer", fontWeight:500, fontSize:12, letterSpacing:"0.03em", transition:"all 0.2s", background:a?C.cyanGlow:"transparent", color:a?C.cyan:C.dim, border:a?`1px solid ${C.cyanDim}`:"1px solid transparent", fontFamily:"'Outfit',sans-serif" }),
  stat:  { background:"#08111f", border:`1px solid ${C.border}`, borderRadius:10, padding:"14px 18px" },
};

/* ── Helpers ── */
const $   = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n||0);
const $k  = n => { if(!n&&n!==0)return"$0"; const a=Math.abs(n); return a>=1e6?`$${(n/1e6).toFixed(2)}M`:a>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${Math.round(n)}`; };
const pct = n => `${(+n||0).toFixed(1)}%`;
const toY = (age,ca) => new Date().getFullYear()+(age-ca);
const CY  = new Date().getFullYear();

/* ── Loan payoff ── */
function loanPayoff(balance, annualRate, monthly) {
  if(balance<=0||monthly<=0) return { months:0, year:CY, totalInterest:0 };
  const r = annualRate/100/12;
  let bal=balance, m=0, totalInt=0;
  while(bal>0.01&&m<600){
    const int = r===0?0:bal*r;
    totalInt+=int;
    const prin=Math.min(monthly-int,bal);
    bal=Math.max(0,bal-prin);
    m++;
  }
  const d=new Date(CY,new Date().getMonth()); d.setMonth(d.getMonth()+m);
  return { months:m, year:d.getFullYear(), totalInterest:totalInt };
}

/* ── UI Atoms ── */
function Field({ label, value, onChange, prefix, suffix, step=1, min=0, max, note, lc }) {
  const [local, setLocal] = React.useState(String(value));
  React.useEffect(()=>{ setLocal(String(value)); }, [value]);
  return (
    <div style={{ marginBottom:13 }}>
      <label style={{ ...S.label, color:lc||C.muted }}>{label}</label>
      <div style={{ display:"flex", alignItems:"center", gap:4 }}>
        {prefix&&<span style={{ color:C.muted, fontSize:12, minWidth:12 }}>{prefix}</span>}
        <input
          type="text"
          inputMode="decimal"
          value={local}
          onChange={e=>setLocal(e.target.value)}
          onBlur={()=>{
            const v=parseFloat(local.replace(/[^0-9.]/g,""))||0;
            const clamped=max!==undefined?Math.min(max,Math.max(min,v)):Math.max(min,v);
            onChange(clamped);
            setLocal(String(clamped));
          }}
          style={{ ...S.inp, flex:1 }}
        />
        {suffix&&<span style={{ color:C.muted, fontSize:12, marginLeft:4 }}>{suffix}</span>}
      </div>
      {note&&<div style={{ fontSize:10, color:C.muted, marginTop:3, lineHeight:1.5 }}>{note}</div>}
    </div>
  );
}

function Slider({ label, value, onChange, min, max, step=1, fmt, color }) {
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <label style={{ ...S.label, marginBottom:0 }}>{label}</label>
        <span style={{ ...S.mono, fontSize:12, color:color||C.cyan }}>{fmt?fmt(value):value}</span>
      </div>
      <input type="range" value={value} min={min} max={max} step={step}
        onChange={e=>onChange(Number(e.target.value))}
        style={{ width:"100%", accentColor:color||C.cyan, cursor:"pointer" }}/>
    </div>
  );
}

function Toggle({ label, checked, onChange, note }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14, gap:12 }}>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:13, fontWeight:500 }}>{label}</div>
        {note&&<div style={{ fontSize:10, color:C.muted, marginTop:2, lineHeight:1.5 }}>{note}</div>}
      </div>
      <button onClick={()=>onChange(!checked)} style={{ width:40, height:22, borderRadius:11, background:checked?C.cyan:C.border, position:"relative", cursor:"pointer", transition:"background 0.2s", flexShrink:0, marginTop:2, border:"none", padding:0 }}>
        <div style={{ width:16, height:16, borderRadius:8, background:"#fff", position:"absolute", top:3, left:checked?21:3, transition:"left 0.2s" }}/>
      </button>
    </div>
  );
}

function KV({ k, v, vc, bold, indent }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:`1px solid ${C.border}`, paddingLeft:indent?14:0 }}>
      <span style={{ fontSize:12, color:bold?C.dim:C.muted }}>{k}</span>
      <span style={{ ...S.mono, fontSize:12, color:vc||C.text, fontWeight:bold?600:400 }}>{v}</span>
    </div>
  );
}

function Head({ title, color, sub }) {
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:13, fontWeight:600, color:color||C.cyan }}>{title}</div>
      {sub&&<div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{sub}</div>}
    </div>
  );
}

function Tip({ icon, title, body, color }) {
  return (
    <div style={{ borderLeft:`3px solid ${color||C.cyan}`, paddingLeft:12, marginBottom:14 }}>
      <div style={{ fontSize:12, fontWeight:600, color:color||C.cyan, marginBottom:2 }}>{icon} {title}</div>
      <div style={{ fontSize:11, color:C.muted, lineHeight:1.6 }}>{body}</div>
    </div>
  );
}
function SectionDivider({ label, color }) {
  return <div style={{ fontSize:11, fontWeight:600, color:color||C.cyan, margin:"14px 0 8px", paddingBottom:4, borderBottom:`1px solid ${C.border}` }}>{label}</div>;
}

/* ── Glossary: term → { plain English explanation, law/source link } ── */
const GLOSSARY = {
  "Rule of 55": {
    tip: "If you leave your employer in or after the year you turn 55, you can withdraw from that employer's 401k/TSP penalty-free — no need to wait until 59½. Applies only to the plan at the job you're leaving.",
    url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-exceptions-to-tax-on-early-distributions",
  },
  "Safe Withdrawal Rate": {
    tip: "The percentage of your portfolio you can withdraw each year with a high probability of not running out of money. The classic number is 4% (the 'Trinity Study'). Longer retirements need a lower rate — 3–3.5% for 40–50 year retirements.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "SWR": {
    tip: "Safe Withdrawal Rate — the percentage of your portfolio you can withdraw annually without depleting it. 4% is the traditional benchmark, but longer retirements may warrant 3–3.5%.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "Roth Conversion Ladder": {
    tip: "A strategy to access retirement funds before 59½ penalty-free. Convert traditional IRA/401k money to a Roth IRA each year. After 5 years, each converted amount becomes accessible without penalty. Requires planning 5 years ahead.",
    url: "https://www.irs.gov/publications/p590b#en_US_2023_publink100090206",
  },
  "SEPP": {
    tip: "Substantially Equal Periodic Payments (also called 72(t)). Allows penalty-free early withdrawals from IRAs/401ks if you commit to a fixed withdrawal schedule for 5 years or until age 59½ (whichever is longer). Inflexible — modifying the schedule triggers a 10% penalty retroactively.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "72(t)": {
    tip: "IRS code section that allows penalty-free early retirement withdrawals via Substantially Equal Periodic Payments (SEPP). You commit to a fixed schedule for 5 years or age 59½, whichever comes later.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "Roth IRA": {
    tip: "An individual retirement account funded with after-tax dollars. Contributions (not earnings) can be withdrawn anytime penalty-free. Earnings are tax-free after age 59½ if the account has been open 5+ years. No required minimum distributions.",
    url: "https://www.irs.gov/publications/p590b",
  },
  "Traditional IRA": {
    tip: "An individual retirement account funded with pre-tax dollars. Contributions may be tax-deductible. Withdrawals in retirement are taxed as ordinary income. Required minimum distributions begin at age 73.",
    url: "https://www.irs.gov/publications/p590a",
  },
  "TSP": {
    tip: "Thrift Savings Plan — the federal government's retirement savings plan, similar to a 401k. Available to military and federal civilian employees. Offers traditional (pre-tax) and Roth options with very low expense ratios.",
    url: "https://www.tsp.gov/publications/tspbk08.pdf",
  },
  "HSA": {
    tip: "Health Savings Account — triple tax advantage: contributions are pre-tax, growth is tax-free, and withdrawals for qualified medical expenses are tax-free. After age 65 withdrawals for any purpose are taxed like a traditional IRA. Must be enrolled in a High Deductible Health Plan (HDHP) to contribute.",
    url: "https://www.irs.gov/publications/p969",
  },
  "VA Disability": {
    tip: "Monthly compensation from the Department of Veterans Affairs for service-connected disabilities. Completely excluded from federal taxable income under 26 U.S.C. § 104. Also excluded from Medicare/Medicaid MAGI calculations, giving you unusual tax planning flexibility.",
    url: "https://www.irs.gov/pub/irs-pdf/p525.pdf",
  },
  "FIRE": {
    tip: "Financial Independence, Retire Early. The point at which your invested portfolio generates enough passive income to cover your living expenses indefinitely — typically calculated as 25x your annual spending (based on the 4% safe withdrawal rate).",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "FIRE Number": {
    tip: "The total portfolio value needed to retire. Calculated as your annual spending divided by your Safe Withdrawal Rate. Example: $60,000/year spending ÷ 4% SWR = $1,500,000 FIRE number.",
    url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-ira-contribution-limits",
  },
  "Depreciation Recapture": {
    tip: "When you sell a rental property, the IRS 'recaptures' the depreciation deductions you took over the years and taxes them at up to 25% (Section 1250 unrecaptured gain) — even if the property qualifies for the $500K primary residence exclusion. Passing the property to heirs eliminates this via stepped-up basis.",
    url: "https://www.irs.gov/publications/p544",
  },
  "Stepped-Up Basis": {
    tip: "When you inherit an asset, your cost basis is 'stepped up' to the fair market value at the date of death — eliminating any capital gains that accumulated during the deceased's lifetime. A powerful estate planning tool for appreciated assets like real estate.",
    url: "https://www.irs.gov/publications/p559",
  },
  "1031 Exchange": {
    tip: "A provision (IRC Section 1031) allowing you to defer capital gains taxes when selling an investment property by reinvesting the proceeds into a 'like-kind' replacement property within strict time limits: 45 days to identify, 180 days to close.",
    url: "https://www.irs.gov/publications/p544#en_US_2023_publink10009867",
  },
  "Section 121 Exclusion": {
    tip: "If you've lived in a home as your primary residence for 2 of the last 5 years, you can exclude up to $250,000 ($500,000 MFJ) of capital gains from the sale. Does not eliminate depreciation recapture from rental years.",
    url: "https://www.irs.gov/publications/p523",
  },
  "QBI Deduction": {
    tip: "Qualified Business Income deduction (Section 199A) — self-employed individuals and pass-through business owners can deduct up to 20% of qualified business income from taxable income. Subject to income limits and business type restrictions.",
    url: "https://www.irs.gov/newsroom/tax-cuts-and-jobs-act-provision-11011-section-199a-qualified-business-income-deduction-faqs",
  },
  "Solo 401k": {
    tip: "A 401k plan for self-employed individuals with no employees (other than a spouse). Allows contributions as both employee ($23,500 in 2025) and employer (up to 25% of net self-employment income), resulting in much higher potential contributions than a standard IRA.",
    url: "https://www.irs.gov/retirement-plans/one-participant-401k-plans",
  },
  "SEP IRA": {
    tip: "Simplified Employee Pension IRA. Allows self-employed individuals to contribute up to 25% of net self-employment income (max ~$70,000 in 2025). Simpler than a Solo 401k but no Roth option and lower contribution flexibility.",
    url: "https://www.irs.gov/retirement-plans/sep-plan-faqs",
  },
  "Self-Employment Tax": {
    tip: "Self-employed individuals pay both the employee and employer share of Social Security (12.4%) and Medicare (2.9%) taxes — totaling 15.3% on net profit up to the SS wage base, plus 2.9% above it. You can deduct half of SE tax from your AGI.",
    url: "https://www.irs.gov/businesses/small-businesses-self-employed/self-employment-tax-social-security-and-medicare-taxes",
  },
  "S-Corp Election": {
    tip: "A tax election (Form 2553) that allows an LLC to be taxed as an S-Corporation. The owner pays themselves a 'reasonable salary' (subject to payroll/SE tax) and takes remaining profit as distributions (not subject to SE tax) — reducing the 15.3% self-employment tax burden.",
    url: "https://www.irs.gov/businesses/small-businesses-self-employed/s-corporations",
  },
  "MAGI": {
    tip: "Modified Adjusted Gross Income — your AGI with certain deductions added back. Determines eligibility for Roth IRA contributions, ACA premium tax credits, and other benefits. VA disability and Roth IRA withdrawals are excluded from MAGI, giving veterans significant tax planning leverage.",
    url: "https://www.irs.gov/e-file-providers/definition-of-adjusted-gross-income",
  },
  "ACA": {
    tip: "Affordable Care Act. Premium tax credits (subsidies) are available to individuals with MAGI between 100–400% of the Federal Poverty Level. For veterans with VA disability, MAGI can be strategically managed since VA income doesn't count — potentially qualifying for significant subsidies even with substantial total income.",
    url: "https://www.healthcare.gov/glossary/modified-adjusted-gross-income-magi/",
  },
  "RMD": {
    tip: "Required Minimum Distribution — the IRS requires you to begin withdrawing a minimum amount from traditional retirement accounts (401k, TSP, Traditional IRA) each year starting at age 73. Roth IRAs have no RMDs. Failure to take RMDs results in a 25% excise tax on the amount not withdrawn.",
    url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-required-minimum-distributions-rmds",
  },
  "NOL": {
    tip: "Net Operating Loss — when your business deductions exceed your business income, the loss can be carried forward to offset taxable income in future profitable years, dollar-for-dollar. Useful when starting a business with initial losses.",
    url: "https://www.irs.gov/publications/p536",
  },
  "DEA": {
    tip: "Dependents' Educational Assistance (Chapter 35) — VA benefit providing up to 45 months of education benefits to eligible dependents of veterans with a permanent and total (P&T) disability rating or who died from a service-connected condition. Entirely separate from GI Bill transfer.",
    url: "https://www.va.gov/education/survivor-dependent-benefits/dependents-education-assistance/",
  },
  "Chapter 35": {
    tip: "Dependents' Educational Assistance program — VA education benefit for dependents of veterans rated permanently and totally disabled. Up to 45 months per eligible dependent. Check eligibility at va.gov.",
    url: "https://www.va.gov/education/survivor-dependent-benefits/dependents-education-assistance/",
  },
  "GI Bill": {
    tip: "Post-9/11 GI Bill (Chapter 33) provides up to 36 months of education benefits including tuition, housing allowance, and book stipend. Benefits are tied to the veteran and can be transferred to dependents only while still on active duty with sufficient service obligation remaining.",
    url: "https://www.va.gov/education/about-gi-bill-benefits/post-9-11/",
  },
  "529 Plan": {
    tip: "A tax-advantaged savings account for education expenses. Contributions are post-tax but grow tax-free; withdrawals for qualified education expenses are tax-free. Up to $35,000 lifetime can be rolled into a Roth IRA (per beneficiary) after 15 years if unused for education.",
    url: "https://www.irs.gov/pub/irs-pdf/p970.pdf",
  },
  "Roth 401k": {
    tip: "A 401k contribution option where you contribute after-tax dollars. Grows tax-free, and qualified withdrawals are tax-free. Unlike a Roth IRA, Roth 401k accounts are subject to Required Minimum Distributions unless rolled over to a Roth IRA. Withdrawals don't count toward MAGI.",
    url: "https://www.irs.gov/retirement-plans/roth-comparison-chart",
  },
  "Traditional 401k": {
    tip: "Pre-tax retirement contributions that reduce your taxable income today. Grows tax-deferred. Withdrawals in retirement are taxed as ordinary income. Subject to RMDs at age 73. Early withdrawals (before 59½) face a 10% penalty plus income tax.",
    url: "https://www.irs.gov/retirement-plans/401k-plans",
  },
  "Employer Match": {
    tip: "Free money from your employer added to your 401k when you contribute. Common structure: 100% match on first 3–6% of salary you contribute. Always contribute at least enough to capture the full match — it's an immediate 100% return.",
    url: "https://www.irs.gov/retirement-plans/plan-sponsor/401k-plan-fix-it-guide-employer-matching-contributions",
  },
};

/* ── Term Component: tooltip explanation + inline law link ── */
function Term({ children, term }) {
  const [show, setShow] = useState(false);
  const entry = GLOSSARY[term || children];
  if (!entry) return <span>{children}</span>;
  return (
    <span style={{ position: "relative", display: "inline-block" }}>
      <a
        href={entry.url}
        target="_blank"
        rel="noopener noreferrer"
        onMouseEnter={() => setShow(true)}
        onMouseLeave={() => setShow(false)}
        style={{ borderBottom: `1px dashed ${C.cyanDim}`, cursor: "pointer", color: C.text, textDecoration: "none" }}
        title="View source law / IRS publication"
      >
        {children} <span style={{ color: C.cyanDim, fontSize: 9, verticalAlign: "super", opacity: 0.7 }}>↗</span>
      </a>
      {show && (
        <div style={{
          position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
          background: "#0d1a2e", border: `1px solid ${C.cyanDim}`, borderRadius: 8,
          padding: "10px 13px", width: 280, zIndex: 999,
          fontSize: 11, color: C.dim, lineHeight: 1.6, boxShadow: "0 4px 24px rgba(0,0,0,0.6)",
          pointerEvents: "none",
        }}>
          <div style={{ fontWeight: 600, color: C.cyan, marginBottom: 4, fontSize: 11 }}>{term || children}</div>
          {entry.tip}
        </div>
      )}
    </span>
  );
}

/* ── Pure SVG Area Chart — no external dependencies ── */
function ResponsiveAreaChart({ data, retAge, ssAge, fireNum, hasMortgage, mortPayoffAge, curAge, scenarioData, scenarioRetAge }) {
  const [tooltip, setTooltip] = useState(null);
  const svgRef = useRef(null);
  if (!data || data.length === 0) return null;

  const W = 860, H = 300, ML = 70, MR = 30, MT = 28, MB = 28;
  const PW = W - ML - MR, PH = H - MT - MB;

  const ages  = data.map(d => d.age);
  const vals  = data.map(d => d.bal);
  const minAge = ages[0], maxAge = ages[ages.length - 1];
  const scenarioVals = scenarioData ? scenarioData.map(d => d.bal) : [];
  const maxVal = Math.max(...vals, ...scenarioVals, fireNum || 0) * 1.08;

  const xS = age  => ML + ((age - minAge) / (maxAge - minAge)) * PW;
  const yS = val  => MT + PH - (val / maxVal) * PH;

  // Build base path
  const pts = data.map(d => `${xS(d.age).toFixed(1)},${yS(d.bal).toFixed(1)}`).join(" L ");
  const linePath = `M ${pts}`;
  const areaPath = `${linePath} L ${xS(maxAge).toFixed(1)},${(MT+PH).toFixed(1)} L ${xS(minAge).toFixed(1)},${(MT+PH).toFixed(1)} Z`;

  // Build scenario path
  const scenarioPath = scenarioData
    ? `M ${scenarioData.map(d => `${xS(d.age).toFixed(1)},${yS(d.bal).toFixed(1)}`).join(" L ")}`
    : null;

  // Y axis ticks
  const yTicks = [];
  const step = maxVal / 4;
  for (let i = 0; i <= 4; i++) yTicks.push(i * step);

  // X axis ticks — every 5 years
  const xTicks = ages.filter(a => a % 5 === 0);

  // Hover handler
  const handleMouseMove = (e) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const scaleX = W / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const age = Math.round(minAge + ((mx - ML) / PW) * (maxAge - minAge));
    const d = data.find(d => d.age === age);
    if (d && mx >= ML && mx <= ML + PW) {
      setTooltip({ age: d.age, bal: d.bal, x: xS(d.age), y: yS(d.bal) });
    } else {
      setTooltip(null);
    }
  };

  const refLines = [
    { age: retAge,        label: "Retire",       color: C.gold,   dash: "6 3" },
    ssAge ? { age: ssAge, label: "SS starts",    color: C.gold,   dash: "3 3" } : null,
    { age: 65,            label: "Medicare",     color: C.green,  dash: "4 4" },
    hasMortgage && mortPayoffAge ? { age: mortPayoffAge, label: "Mortgage off", color: "#b78bfa", dash: "4 4" } : null,
  ].filter(Boolean);

  return (
    <div style={{ width:"100%", overflowX:"auto" }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:330, display:"block" }}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setTooltip(null)}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%"  stopColor={C.cyan} stopOpacity={0.28}/>
            <stop offset="95%" stopColor={C.cyan} stopOpacity={0.02}/>
          </linearGradient>
        </defs>

        {/* Grid lines */}
        {yTicks.map(v => (
          <line key={v} x1={ML} x2={ML+PW} y1={yS(v).toFixed(1)} y2={yS(v).toFixed(1)}
            stroke={C.border} strokeDasharray="3 3" strokeWidth={1}/>
        ))}

        {/* Y axis labels */}
        {yTicks.map(v => (
          <text key={v} x={ML-6} y={yS(v)+4} textAnchor="end" fontSize={9}
            fill={C.muted} fontFamily="JetBrains Mono,monospace">{$k(v)}</text>
        ))}

        {/* X axis labels */}
        {xTicks.map(a => (
          <text key={a} x={xS(a)} y={MT+PH+14} textAnchor="middle" fontSize={9}
            fill={C.muted} fontFamily="JetBrains Mono,monospace">{a}</text>
        ))}

        {/* FIRE # reference line */}
        {fireNum > 0 && (
          <>
            <line x1={ML} x2={ML+PW} y1={yS(fireNum).toFixed(1)} y2={yS(fireNum).toFixed(1)}
              stroke={C.gold} strokeDasharray="3 3" strokeWidth={1}/>
            <text x={ML+PW+2} y={yS(fireNum)+4} fontSize={9} fill={C.gold}
              fontFamily="JetBrains Mono,monospace">FIRE #</text>
          </>
        )}

        {/* Vertical reference lines */}
        {refLines.map(r => r.age >= minAge && r.age <= maxAge && (
          <g key={r.label}>
            <line x1={xS(r.age).toFixed(1)} x2={xS(r.age).toFixed(1)}
              y1={MT} y2={MT+PH} stroke={r.color} strokeDasharray={r.dash} strokeWidth={1.5}/>
            <text x={xS(r.age)+3} y={MT+10} fontSize={9} fill={r.color}
              fontFamily="JetBrains Mono,monospace">{r.label}</text>
          </g>
        ))}

        {/* Area fill */}
        <path d={areaPath} fill="url(#areaGrad)"/>

        {/* Base line */}
        <path d={linePath} fill="none" stroke={C.cyan} strokeWidth={2}/>

        {/* Scenario overlay line */}
        {scenarioPath&&(
          <>
            <path d={scenarioPath} fill="none" stroke={C.gold} strokeWidth={2} strokeDasharray="6 3" opacity={0.85}/>
            {scenarioRetAge&&scenarioRetAge>=minAge&&scenarioRetAge<=maxAge&&(
              <g>
                <line x1={xS(scenarioRetAge).toFixed(1)} x2={xS(scenarioRetAge).toFixed(1)}
                  y1={MT} y2={MT+PH} stroke={C.gold} strokeDasharray="4 2" strokeWidth={1.5} opacity={0.6}/>
                <text x={xS(scenarioRetAge)+3} y={MT+22} fontSize={9} fill={C.gold}
                  fontFamily="JetBrains Mono,monospace">Age {scenarioRetAge}</text>
              </g>
            )}
          </>
        )}

        {/* Tooltip */}
        {tooltip && (
          <g>
            <line x1={tooltip.x} x2={tooltip.x} y1={MT} y2={MT+PH}
              stroke={C.muted} strokeWidth={1} strokeDasharray="2 2"/>
            <circle cx={tooltip.x} cy={tooltip.y} r={4} fill={C.cyan}/>
            <rect x={Math.min(tooltip.x+8, ML+PW-130)} y={tooltip.y-36}
              width={120} height={38} rx={6} fill="#0d1a2e" stroke={C.border}/>
            <text x={Math.min(tooltip.x+14, ML+PW-124)} y={tooltip.y-20}
              fontSize={10} fill={C.gold} fontFamily="JetBrains Mono,monospace" fontWeight={600}>
              Age {tooltip.age} · {toY(tooltip.age, curAge)}
            </text>
            <text x={Math.min(tooltip.x+14, ML+PW-124)} y={tooltip.y-7}
              fontSize={11} fill={C.cyan} fontFamily="JetBrains Mono,monospace">
              {$k(tooltip.bal)}
            </text>
          </g>
        )}
      </svg>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   MAIN
══════════════════════════════════════════════════════════════ */
function RetirementCalc() {
  const [p, setP]             = useState(DEFAULTS);
  const [onboarded, setOnboarded] = useState(false);
  const [step, setStep]       = useState(1);
  const set = (k,v) => setP(prev=>({ ...prev, [k]:v }));

  const TOTAL_STEPS = 9;

  /* ══════ WIZARD ══════ */
  const WizCard = ({ children, title, sub, tip }) => (
    <div style={{ maxWidth:520, margin:"0 auto", padding:"0 20px" }}>
      {tip&&<WizTip icon="💡" text={tip}/>}
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:22, fontWeight:700, color:C.text, fontFamily:"'Cormorant Garamond',serif", lineHeight:1.2 }}>{title}</div>
        {sub&&<div style={{ fontSize:12, color:C.muted, marginTop:6, lineHeight:1.6 }}>{sub}</div>}
      </div>
      {children}
    </div>
  );

  const WizBtn = ({ label, onClick, secondary, disabled }) => (
    <button onClick={onClick} disabled={disabled} style={{
      padding:"11px 28px", borderRadius:8, border:"none", cursor:disabled?"not-allowed":"pointer",
      fontFamily:"'Outfit',sans-serif", fontSize:13, fontWeight:600, letterSpacing:"0.04em",
      background: secondary ? "transparent" : `linear-gradient(135deg,${C.cyanDim},${C.cyan})`,
      color: secondary ? C.muted : "#000",
      border: secondary ? `1px solid ${C.border}` : "none",
      opacity: disabled ? 0.4 : 1,
      transition:"all 0.2s",
    }}>{label}</button>
  );

  const WizField = ({ label, value, onChange, prefix, suffix, min=0, max, note, type="number" }) => {
    const [local, setLocal] = React.useState(String(value));
    React.useEffect(()=>{ setLocal(String(value)); }, [value]);
    return (
      <div style={{ marginBottom:18 }}>
        <label style={{ ...S.label, fontSize:11 }}>{label}</label>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {prefix&&<span style={{ color:C.muted, fontSize:15, minWidth:16 }}>{prefix}</span>}
          <input
            type="text"
            inputMode={type==="number"?"decimal":"text"}
            value={local}
            onChange={e=>setLocal(e.target.value)}
            onBlur={()=>{
              if(type==="number"){
                const v=parseFloat(local.replace(/[^0-9.]/g,""))||0;
                const clamped=max!==undefined?Math.min(max,Math.max(min,v)):Math.max(min,v);
                onChange(clamped);
                setLocal(String(clamped));
              } else { onChange(local); }
            }}
            style={{ ...S.inp, fontSize:16, padding:"13px 14px", flex:1, WebkitAppearance:"none", borderRadius:10 }}
          />
          {suffix&&<span style={{ color:C.muted, fontSize:13, marginLeft:4 }}>{suffix}</span>}
        </div>
        {note&&<div style={{ fontSize:11, color:C.muted, marginTop:5, lineHeight:1.5 }}>{note}</div>}
      </div>
    );
  };

  /* ── Tip card shown on each wizard step ── */
  const WizTip = ({ icon, text }) => (
    <div style={{ borderLeft:`3px solid ${C.gold}`, paddingLeft:12, marginBottom:24, background:"rgba(244,185,66,0.05)", borderRadius:"0 8px 8px 0", padding:"12px 12px 12px 14px" }}>
      <div style={{ fontSize:11, color:C.gold, fontWeight:600, marginBottom:4 }}>{icon} DID YOU KNOW</div>
      <div style={{ fontSize:12, color:C.dim, lineHeight:1.6 }}>{text}</div>
    </div>
  );

  const stepTips = [
    null, // placeholder
    // Step 1: Welcome
    "The average American spends more time planning a vacation than planning for retirement. A few minutes of honest math today can change everything about how your future looks.",
    // Step 2: Basics — age
    "Starting to invest at 25 instead of 35 — with the same annual contributions — can result in nearly double the retirement portfolio. Time in the market beats timing the market every time.",
    // Step 3: Income
    "Every $1,000/month of guaranteed income in retirement — like a pension or VA disability — reduces your required savings by roughly $300,000. Income streams are the most powerful FIRE accelerators.",
    // Step 4: Housing
    "Your mortgage rate is one of the most important numbers in your financial life. A 2.5% mortgage is an asset — never pay it off early. A 7% mortgage is a liability — every extra payment is a guaranteed 7% return.",
    // Step 5: Vehicle
    "Car payments are the most common reason people can't save for retirement. A $500/month car payment invested instead from age 25 to 55 at 7% growth becomes over $600,000.",
    // Step 6: Savings
    "Already have money invested? It's doing more work than you think. $50,000 invested today at 7% growth for 25 years becomes over $270,000 — without adding another dollar.",
    // Step 7: Contributions
    "Your employer match is the only guaranteed 100% instant return in investing. If your employer matches 4% and you contribute 4%, you've already earned a 100% return on those dollars before the market does anything.",
    // Step 8: Guaranteed income
    "VA disability compensation is completely excluded from federal income tax and from MAGI calculations — meaning it doesn't count against Roth IRA eligibility or ACA subsidy thresholds. Non-taxable guaranteed income is one of the most powerful FIRE accelerators because it reduces your required portfolio size dollar for dollar.",
    // Step 9: Expenses
    "Your monthly spending has a 25× multiplier on what you need to retire. Every $100/month you reduce from your retirement spending reduces your required savings by $30,000. Lifestyle design is retirement planning.",
  ];

  const WizToggle = ({ label, checked, onChange, note }) => (
    <button onClick={()=>onChange(!checked)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px", borderRadius:10, width:"100%", textAlign:"left",
      background: checked ? "rgba(0,238,255,0.06)" : "#07101e", border:`1px solid ${checked?C.cyanDim:C.border}`,
      cursor:"pointer", marginBottom:10, transition:"all 0.2s" }}>
      <div>
        <div style={{ fontSize:13, fontWeight:500, color:checked?C.cyan:C.text }}>{label}</div>
        {note&&<div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{note}</div>}
      </div>
      <div style={{ width:40, height:22, borderRadius:11, background:checked?C.cyan:C.border, position:"relative", flexShrink:0, transition:"background 0.2s", marginLeft:12 }}>
        <div style={{ width:16, height:16, borderRadius:8, background:"#fff", position:"absolute", top:3, left:checked?21:3, transition:"left 0.2s" }}/>
      </div>
    </button>
  );

  // Step content — function so it re-evaluates when p changes
  const getWizStep = (s) => {
    const tip = stepTips[s];
    if(s===1) return (
    <WizCard title="Let's build your retirement plan." tip={tip} sub="Answer a few simple questions and we'll model your complete financial picture. Takes about 2 minutes.">
      <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:28 }}>
        {[
          { icon:"🎯", label:"Your FIRE number — what you need to retire" },
          { icon:"📈", label:"Portfolio projection to your target age" },
          { icon:"💡", label:"Personalized insights and action steps" },
          { icon:"🔑", label:"Optimal contribution strategy for your situation" },
        ].map(({ icon,label })=>(
          <div key={label} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", background:"#07101e", borderRadius:8, border:`1px solid ${C.border}` }}>
            <span style={{ fontSize:18 }}>{icon}</span>
            <span style={{ fontSize:12, color:C.dim }}>{label}</span>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
        <WizBtn label="Get Started →" onClick={()=>setStep(2)}/>
        <button onClick={()=>setOnboarded(true)} style={{ background:"none", border:"none", color:C.muted, fontSize:11, cursor:"pointer", textDecoration:"underline" }}>
          Skip setup — go straight to calculator
        </button>
      </div>
    </WizCard>);
    if(s===2) return (
    <WizCard title="The basics." tip={tip} sub="This shapes everything — your time horizon and how long your money needs to last.">
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:12, color:C.dim, marginBottom:8, fontWeight:500 }}>Filing status</div>
        <div style={{ display:"flex", gap:8 }}>
          {[{v:"mfj",l:"Married / Filing Jointly"},{v:"single",l:"Single / Filing Separately"}].map(opt=>(
            <button key={opt.v} onClick={()=>set("filingStatus",opt.v)} style={{
              flex:1, padding:"10px 8px", borderRadius:8, cursor:"pointer", textAlign:"center",
              fontFamily:"'Outfit',sans-serif", fontSize:12, fontWeight:500,
              background:p.filingStatus===opt.v?"rgba(0,238,255,0.1)":"#07101e",
              color:p.filingStatus===opt.v?C.cyan:C.dim,
              border:`1px solid ${p.filingStatus===opt.v?C.cyan:C.border}`,
            }}>{opt.l}</button>
          ))}
        </div>
      </div>
      <WizField label="How old are you?" value={p.curAge} onChange={v=>set("curAge",Math.min(80,Math.max(16,v)))} min={16} max={80} suffix="years old"/>
      <WizField label="What age do you want to retire?" value={p.retAge} onChange={v=>set("retAge",Math.min(85,Math.max(p.curAge+1,v)))} min={p.curAge+1} max={85} suffix="years old"
        note={`That's ${Math.max(0,p.retAge-p.curAge)} years from now — ${new Date().getFullYear()+(p.retAge-p.curAge)}`}/>
      <WizField label="Plan your finances through age..." value={p.planAge} onChange={v=>set("planAge",Math.min(105,Math.max(p.retAge+5,v)))} min={p.retAge+5} max={105} suffix="years old"
        note="How long your money needs to last. 90 is a solid conservative baseline."/>
    </WizCard>);
    if(s===3) return (
    <WizCard title="Your income." tip={tip} sub="We use this to calculate contributions, taxes, and your savings capacity.">
      <WizField label="Annual gross salary (before taxes)" value={p.salary} onChange={v=>set("salary",v)} prefix="$" note="Your W-2 income before any deductions"/>
      <WizField label="Expected annual salary growth" value={p.salaryGrowth} onChange={v=>set("salaryGrowth",v)} suffix="%" min={0} max={15} note="3% tracks inflation. Use higher if you expect promotions."/>
      {p.filingStatus==="mfj"&&<WizField label="Spouse or partner annual income" value={p.spouseIncome} onChange={v=>set("spouseIncome",v)} prefix="$" note="Enter 0 if not applicable"/>}
      <WizField label="Health insurance premium per paycheck" value={p.hcPremiumPerPaycheck} onChange={v=>set("hcPremiumPerPaycheck",v)} prefix="$" note="Pre-tax payroll deduction — reduces your taxable income. Enter 0 if covered by employer or not applicable."/>
    </WizCard>);
    if(s===4) return (
    <WizCard title="Housing." tip={tip} sub="Your largest expense — and one of the most important variables in your retirement plan.">
      <WizToggle label="I own a home" checked={p.hasMortgage} onChange={v=>{set("hasMortgage",v); if(!v){set("propTax",0); set("mortBal",0); set("mortPI",0); set("mortTotal",0);}}} note="Toggle off if you rent"/>
      {p.hasMortgage ? <>
        <WizField label="Current mortgage balance" value={p.mortBal} onChange={v=>set("mortBal",v)} prefix="$"/>
        <WizField label="Monthly P&I payment" value={p.mortPI} onChange={v=>{set("mortPI",v);set("mortTotal",v);}} prefix="$" note="Principal & interest only — property tax and insurance entered separately below"/>
        <WizField label="Interest rate" value={p.mortRate} onChange={v=>set("mortRate",v)} suffix="%" min={0} max={15}/>
        <WizField label="Monthly property tax" value={p.propTax} onChange={v=>set("propTax",v)} prefix="$" note="Annual tax ÷ 12"/>
        <WizField label="Monthly home insurance" value={p.homeInsurance} onChange={v=>set("homeInsurance",v)} prefix="$"/>
      </> : <>
        <WizField label="Monthly rent" value={p.mortTotal} onChange={v=>set("mortTotal",v)} prefix="$" note="Treated as a housing expense in your budget"/>
        <WizField label="Monthly renters insurance" value={p.homeInsurance} onChange={v=>set("homeInsurance",v)} prefix="$"/>
      </>}
    </WizCard>);
    if(s===5) return (
    <WizCard title="Debts." tip={tip} sub="Non-mortgage debts — enter what you have and we'll track when each clears and redirect that cash toward investments.">

      {/* Car loan — always shown as example */}
      <div style={{ background:"#07101e", borderRadius:10, padding:"14px", marginBottom:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <input value={p.debt1Name} onChange={e=>set("debt1Name",e.target.value)}
            style={{ ...S.inp, fontSize:13, fontWeight:600, color:C.cyan, width:"60%" }}/>
          <WizToggle label="Active" checked={p.debt1Bal>0}
            onChange={v=>{ if(!v){set("debt1Bal",0);set("debt1Monthly",0);}else{set("debt1Bal",10000);set("debt1Monthly",300);}}}/>
        </div>
        {p.debt1Bal>0&&<>
          <WizField label="Balance" value={p.debt1Bal} onChange={v=>set("debt1Bal",v)} prefix="$"/>
          <WizField label="Interest rate" value={p.debt1Rate} onChange={v=>set("debt1Rate",v)} suffix="%" min={0} max={30}/>
          <WizField label="Monthly payment" value={p.debt1Monthly} onChange={v=>set("debt1Monthly",v)} prefix="$"/>
        </>}
      </div>

      {/* Second debt */}
      {(p.debt1Bal>0 || p.debt2Bal>0) && (
        <div style={{ background:"#07101e", borderRadius:10, padding:"14px", marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <input value={p.debt2Name} onChange={e=>set("debt2Name",e.target.value)}
              style={{ ...S.inp, fontSize:13, fontWeight:600, color:C.cyan, width:"60%" }}/>
            <WizToggle label="Active" checked={p.debt2Bal>0}
              onChange={v=>{ if(!v){set("debt2Bal",0);set("debt2Monthly",0);}else{set("debt2Bal",10000);set("debt2Monthly",300);}}}/>
          </div>
          {p.debt2Bal>0&&<>
            <WizField label="Balance" value={p.debt2Bal} onChange={v=>set("debt2Bal",v)} prefix="$"/>
            <WizField label="Interest rate" value={p.debt2Rate} onChange={v=>set("debt2Rate",v)} suffix="%" min={0} max={30}/>
            <WizField label="Monthly payment" value={p.debt2Monthly} onChange={v=>set("debt2Monthly",v)} prefix="$"/>
          </>}
        </div>
      )}

      {/* Third debt */}
      {(p.debt2Bal>0 || p.debt3Bal>0) && (
        <div style={{ background:"#07101e", borderRadius:10, padding:"14px", marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <input value={p.debt3Name} onChange={e=>set("debt3Name",e.target.value)}
              style={{ ...S.inp, fontSize:13, fontWeight:600, color:C.cyan, width:"60%" }}/>
            <WizToggle label="Active" checked={p.debt3Bal>0}
              onChange={v=>{ if(!v){set("debt3Bal",0);set("debt3Monthly",0);}else{set("debt3Bal",5000);set("debt3Monthly",200);}}}/>
          </div>
          {p.debt3Bal>0&&<>
            <WizField label="Balance" value={p.debt3Bal} onChange={v=>set("debt3Bal",v)} prefix="$"/>
            <WizField label="Interest rate" value={p.debt3Rate} onChange={v=>set("debt3Rate",v)} suffix="%" min={0} max={30}/>
            <WizField label="Monthly payment" value={p.debt3Monthly} onChange={v=>set("debt3Monthly",v)} prefix="$"/>
          </>}
        </div>
      )}

      {p.debt1Bal===0 && p.debt2Bal===0 && p.debt3Bal===0 && (
        <div style={{ fontSize:11, color:C.muted, textAlign:"center", padding:"4px 0 8px" }}>
          Toggle on to add a debt, or continue if you have none.
        </div>
      )}
    </WizCard>);
    if(s===6) return (
    <WizCard title="Your savings so far." tip={tip} sub="Enter current balances. Don't worry if you're starting from zero — that's what we're here for.">
      <WizField label="Traditional 401k / TSP balance" value={p.trad401kBal} onChange={v=>set("trad401kBal",v)} prefix="$" note="Pre-tax contributions — taxable on withdrawal"/>
      <WizField label="Roth 401k balance" value={p.roth401kBal} onChange={v=>set("roth401kBal",v)} prefix="$" note="After-tax contributions — tax-free on qualified withdrawal"/>
      <WizField label="Roth IRA balance" value={p.rothIRA} onChange={v=>set("rothIRA",v)} prefix="$"/>
      <WizField label="HSA balance" value={p.hsa} onChange={v=>set("hsa",v)} prefix="$"/>
      <WizField label="Taxable brokerage / investments" value={p.brokerage} onChange={v=>set("brokerage",v)} prefix="$"/>
      <WizField label="Cash savings / emergency fund" value={p.cash} onChange={v=>set("cash",v)} prefix="$" note="Checking, savings, money market"/>
    </WizCard>);
    if(s===7) return (
    <WizCard title="How you're investing." tip={tip} sub="This drives the projection — even small contribution changes have a big long-term impact.">
      <WizField label="Your 401k / TSP contribution (% of salary)" value={p.trad401kPct+p.roth401kPct} onChange={v=>{set("trad401kPct",v);set("roth401kPct",0);}} suffix="%" min={0} max={50} note={`${$(p.salary*(p.trad401kPct+p.roth401kPct)/100)}/yr · split Roth vs Traditional in Variables`}/>
      <WizField label="Employer match (% of salary)" value={p.empMatchPct} onChange={v=>set("empMatchPct",v)} suffix="%" min={0} max={15} note={`Free money: ${$(p.salary*p.empMatchPct/100)}/yr`}/>
      <WizField label="Annual Roth IRA contribution" value={p.rothIRAContrib} onChange={v=>set("rothIRAContrib",Math.min(rothIRALimit,v))} prefix="$" min={0} max={rothIRALimit} note={`2026 max: ${$(rothIRALimit)}${p.curAge>=50?" (catch-up included)":""}`}/>
      <WizField label="Annual HSA contribution" value={p.hsaAnnual} onChange={v=>set("hsaAnnual",v)} prefix="$" min={0} note="2026 max: $8,750 family · $4,400 individual (+$1,000 catch-up at 55+)"/>
      <div style={{ height:1, background:C.border, margin:"16px 0" }}/>
      <WizToggle label="I have a 401k loan" checked={p.debt3Bal>0}
        onChange={v=>{ if(!v){set("debt3Bal",0);set("debt3Monthly",0);set("debt3Rate",0);}else{set("debt3Bal",5000);set("debt3Monthly",200);set("debt3Name","401k Loan");set("debt3Rate",0);}}}
        note="401k loans repay to yourself but cost you market returns on the borrowed balance — often more expensive than they appear"/>
      {p.debt3Bal>0&&<>
        <WizField label="Remaining loan balance" value={p.debt3Bal} onChange={v=>set("debt3Bal",v)} prefix="$"/>
        <WizField label="Monthly payment" value={p.debt3Monthly} onChange={v=>set("debt3Monthly",v)} prefix="$" note="Repayments go back into your 401k — modeled as contributions"/>
      </>}
    </WizCard>);
    if(s===8) return (
    <WizCard title="Guaranteed income." tip={tip} sub="Non-taxable or guaranteed income dramatically reduces your required savings — every $1,000/month here means ~$300,000 less you need in the portfolio.">
      <WizToggle label="I receive non-taxable guaranteed income" checked={p.hasVA} onChange={v=>set("hasVA",v)} note="VA disability, pension, or any tax-free income — excluded from MAGI calculations"/>
      {p.hasVA&&<>
        <WizField label="Monthly amount (total non-taxable income)" value={p.vaMonthly} onChange={v=>set("vaMonthly",v)} prefix="$" note={p.filingStatus==="mfj"
          ? "2026 VA rates (with spouse) — 30%: $617 · 50%: $1,242 · 70%: $1,961 · 100%: $4,158"
          : "2026 VA rates (veteran alone) — 10%: $176 · 30%: $538 · 50%: $1,133 · 70%: $1,808 · 100%: $3,939"
        }/>
        <WizToggle label="I use VA healthcare" checked={p.vaHealthVet} onChange={v=>set("vaHealthVet",v)} note="50%+ rating → Priority Group 2"/>
      </>}
      <WizToggle label="I plan to take Social Security" checked={p.hasSS} onChange={v=>set("hasSS",v)} note="Can be received simultaneously with VA disability — no offset"/>
      {p.hasSS&&<>
        <WizField label="Estimated monthly SS benefit at full retirement age" value={p.ssMonthly} onChange={v=>set("ssMonthly",v)} prefix="$" note="Get your real estimate at ssa.gov/myaccount"/>
        <WizField label="What age do you plan to claim SS?" value={p.ssAge} onChange={v=>set("ssAge",v)} min={62} max={70} suffix="years old" note="62=reduced · 67=full · 70=maximum (+32% vs 67)"/>
      </>}
    </WizCard>);
    if(s===9) return (
    <WizCard title="Monthly living expenses." tip={tip} sub="Your spending level determines your FIRE number — every dollar here has roughly a 25× multiplier on what you need saved.">
      <WizField label="Food & groceries" value={p.food} onChange={v=>set("food",v)} prefix="$" note="Monthly grocery and dining budget"/>
      <WizField label="Utilities (electric + water combined)" value={p.electric+p.water} onChange={v=>{set("electric",Math.round(v*0.67));set("water",Math.round(v*0.33));}} prefix="$"/>
      <WizField label="Phone & internet" value={p.phone+p.internet} onChange={v=>{set("phone",Math.round(v*0.45));set("internet",Math.round(v*0.55));}} prefix="$"/>
      <WizField label="Car insurance (all vehicles)" value={p.carInsurance} onChange={v=>set("carInsurance",v)} prefix="$"/>
      <WizField label="Gas / transportation" value={p.gasMonthly} onChange={v=>set("gasMonthly",v)} prefix="$"/>
      <WizField label="Everything else (misc. monthly)" value={p.other} onChange={v=>set("other",v)} prefix="$" note="Subscriptions, clothing, entertainment, personal care"/>
    </WizCard>);
    return null;
  };

  /* ══════════════════════════════════════════════════════════════════════════
     ANNUAL UPDATE CHECKLIST — update these when tax year changes
     Last updated: 2026 (IRS Rev. Proc. 2025-32 + OBBBA adjustments)
     Next review:  January 2027

     To update:
     1. TAX_YEAR — increment
     2. BKTS_MFJ / BKTS_SINGLE — bracket widths from IRS Rev. Proc.
     3. STD_DED_MFJ / STD_DED_SINGLE — standard deduction amounts
     4. FPL_MFJ / FPL_SINGLE — Federal Poverty Level (HHS, published Jan/Feb)
     5. IRA_LIMIT / IRA_CATCHUP — from IRS COLA announcement (Oct)
     6. HSA_SELF / HSA_FAMILY / HSA_CATCHUP — from IRS Rev. Proc.
     7. K401_LIMIT / K401_CATCHUP / K401_SUPER — from IRS COLA announcement
     8. MEDICARE_BASE — Part B premium (CMS, announced Nov)
     9. VA rates in field notes — from VA.gov (Dec 1 each year)
     10. Roth IRA phase-out ranges in MAGI section
     11. RATE_SAVINGS / RATE_BROK / RATE_ROTH / RATE_HSA — review annually against market conditions
  ══════════════════════════════════════════════════════════════════════════ */
  const TAX_YEAR = 2026;

  /* ══════ SHARED TAX CALCULATION — single source of truth for all brackets ══════ */
  // 2026 IRS bracket widths (not cumulative tops) for MFJ and Single
  const BKTS_MFJ    = [[24800,.10],[76000,.12],[110600,.22],[192150,.24],[108900,.32],[256250,.35],[Infinity,.37]];
  const BKTS_SINGLE = [[12400,.10],[38000,.12],[55300,.22],[96075,.24],[54450,.32],[384375,.35],[Infinity,.37]];
  const STD_DED_MFJ    = 32200;
  const STD_DED_SINGLE = 16100;
  const FICA_RATE      = 0.0765;
  const PAYCHECKS_YR   = 26;
  const FPL_MFJ        = 21150;  // 2026 base FPL for household of 2
  const FPL_SINGLE     = 15650;  // 2026 base FPL for individual
  const PRE55_PENALTY  = 0.30;   // effective cost of pre-55 401k withdrawal (10% penalty + ~20% tax)
  const PRE55_PARTIAL  = 0.60;   // fraction of penalty applied — partial since some funds accessible penalty-free

  // Pure function: given taxable income and filing status, returns { tax, effectiveRate, marginalRate }
  const calcTax = (taxableIncome, isMfj) => {
    const bkts = isMfj ? BKTS_MFJ : BKTS_SINGLE;
    let tax = 0, rem = Math.max(0, taxableIncome), marginal = 0;
    for(const [cap, r] of bkts) {
      const t = Math.min(rem, cap);
      tax += t * r;
      if(t > 0) marginal = r;
      rem -= t;
      if(rem <= 0) break;
    }
    return {
      tax,
      effectiveRate: taxableIncome > 0 ? tax / taxableIncome : 0,
      marginalRate: marginal,
    };
  };

  // Given a net-after-tax amount needed, gross it up to the pre-tax withdrawal amount
  // Uses iterative approach since effective rate depends on the gross amount
  const grossUpWithdrawal = (netNeeded, isMfj, stdDed) => {
    if(netNeeded <= 0) return 0;
    // Binary search: find gross such that gross - tax(gross - stdDed) = netNeeded
    let lo = netNeeded, hi = netNeeded * 2;
    for(let i = 0; i < 20; i++) {
      const mid = (lo + hi) / 2;
      const taxable = Math.max(0, mid - stdDed);
      const { tax } = calcTax(taxable, isMfj);
      const net = mid - tax;
      if(net < netNeeded) lo = mid; else hi = mid;
    }
    return (lo + hi) / 2;
  };

  const RATE_SAVINGS  = 2.0;  // HYSA / savings account
  const RATE_BROK     = 6.0;  // Taxable brokerage (after LTCG tax drag)
  const RATE_ROTH     = 7.0;  // Roth IRA + Roth 401k (tax-free growth)
  const RATE_HSA      = 9.0;  // HSA invested (triple tax advantage, aggressive)
  // Traditional 401k/TSP uses p.growth (user-configurable, default 9%)
  // Savings account uses RATE_SAVINGS (replaces savingsRate in DEFAULTS)

  /* ══════ SHARED SIMULATION ENGINE ══════════════════════════════════════════
     Single source of truth for all portfolio projections.
     Called by: useMemo (main projection + sweep), computeScenarioChart (Page 2)

     q             — full params object (p or modified scenario copy)
     livingMo      — pre-computed monthly living expenses
     hcFn          — makeHcMonthly(q) result
     surplusFn     — yearlySurplus function for this param set
     debtMonths    — { d1, d2, d3 } months to payoff for each debt
  ════════════════════════════════════════════════════════════════════════════ */
  const runSimulation = (q, livingMo, hcFn, surplusFn, debtMonths, retAge) => {
    const isMfj = q.filingStatus === "mfj";
    // All buckets grow at user's assumed rate — differentiated rates apply only to surplus routing
    let trad    = q.trad401kBal;   // Traditional 401k/TSP
    let roth401 = q.roth401kBal;   // Roth 401k
    let rothIRA = q.rothIRA;       // Roth IRA
    let hsaBal  = q.hsa;           // HSA
    let brok    = q.brokerage;     // Taxable brokerage
    let sav     = 0;               // Savings/HYSA — surplus only, grows at RATE_SAVINGS
    let ok = true;
    const data = [];
    const earlyPenaltyRate = retAge < 55 ? PRE55_PENALTY : 0;
    const gr  = q.growth/100;      // user's assumed portfolio growth rate
    const grS = RATE_SAVINGS/100;  // savings account — lower, no market risk

    const hsaForYrQ = yr => {
      return (q.hsaAnnual||0) + (q.hsaEmployer||0);
    };

    for(let age = q.curAge; age <= q.planAge; age++) {
      const yr  = CY + (age - q.curAge);
      const yrs = age - q.curAge;
      const yrsR = age - retAge;
      const inRet = age >= retAge;
      const total = () => Math.max(0, trad+roth401+rothIRA+hsaBal+brok+sav);

      if(!inRet) {
        const sal = q.salary * Math.pow(1+q.salaryGrowth/100, yrs);
        const tradContrib  = sal*((q.trad401kPct+q.empMatchPct+q.empBasePct)/100);
        const roth401Cont  = sal*(q.roth401kPct/100);
        const loanRepay    = (q.debt3Bal>0 && yrs*12 < debtMonths.d3) ? q.debt3Monthly*12 : 0;
        const surplus      = surplusFn(yrs);
        // Surplus goes to correct bucket — savings at lower rate, everything else at p.growth
        trad    = trad   *(1+gr) + tradContrib + loanRepay + (surplus.ret||0);
        roth401 = roth401*(1+gr) + roth401Cont;
        rothIRA = rothIRA*(1+gr) + (q.rothIRAContrib||0) + (surplus.roth||0);
        hsaBal  = hsaBal *(1+gr) + hsaForYrQ(yr) + (surplus.hsa||0);
        brok    = brok   *(1+gr) + (q.monthlyBrokerageContrib||0)*12 + (surplus.brok||0);
        sav     = sav    *(1+grS) + (surplus.sav||0);
      } else {
        const baseNoHousing = q.hasMortgage
          ? (livingMo - q.propTax - q.homeInsurance)
          : (livingMo - q.homeInsurance);
        const lInfl = q.hasMortgage
          ? baseNoHousing*12*(q.retRatio/100)*Math.pow(1+q.inflation/100,yrs) + (q.propTax+q.homeInsurance)*12*Math.pow(1+q.inflation/100*1.5,yrs)*(q.retRatio/100)
          : baseNoHousing*12*(q.retRatio/100)*Math.pow(1+q.inflation/100,yrs);
        const eInfl = q.retExtras*12*Math.pow(1+q.inflation/100,yrs);
        const mAnn  = (q.hasMortgage ? (yr <= q.mortPayoff ? q.mortTotal*12 : 0) : q.mortTotal*12);
        const hcAnn = hcFn(age, yrsR)*12;
        const vaAnn = q.hasVA  ? q.vaMonthly*12*Math.pow(1+q.vaCola/100,yrs) : 0;
        const ssAnn = q.hasSS && age>=q.ssAge ? q.ssMonthly*12*Math.pow(1+q.inflation/100,yrs) : 0;
        const draw  = Math.max(0, lInfl+eInfl+mAnn+hcAnn-vaAnn-ssAnn);

        if(retAge < 55) {
          // Pre-55: brokerage first, then penalized retirement accounts
          const brokDraw = Math.min(draw, Math.max(0, brok+sav));
          const retDraw  = Math.max(0, draw - brokDraw);
          const penDraw  = retDraw > 0 ? retDraw / (1 - earlyPenaltyRate) : 0;
          const rothPen  = Math.min(penDraw * PRE55_PARTIAL, Math.max(0, roth401+rothIRA));
          const tradPen  = Math.max(0, penDraw - rothPen);
          trad    = trad   *(1+gr) - tradPen;
          roth401 = roth401*(1+gr) - rothPen*0.5;
          rothIRA = rothIRA*(1+gr) - rothPen*0.5;
          hsaBal  = hsaBal *(1+gr);
          brok    = brok   *(1+gr) - brokDraw*0.7;
          sav     = sav    *(1+grS) - brokDraw*0.3;
        } else {
          // 55+: Traditional up to std deduction (tax-free), then Roth, then grossed-up overflow
          const stdDed   = isMfj ? STD_DED_MFJ : STD_DED_SINGLE;
          const tradFree = Math.min(draw, Math.min(stdDed, Math.max(0, trad)));
          const remain   = Math.max(0, draw - tradFree);
          const rothAvail= Math.max(0, roth401+rothIRA);
          const rothDraw = Math.min(remain, rothAvail);
          const overflow = Math.max(0, remain - rothDraw);
          const tradDraw = tradFree + (overflow > 0 ? grossUpWithdrawal(overflow, isMfj, stdDed) : 0);
          trad    = trad   *(1+gr) - tradDraw;
          roth401 = roth401*(1+gr) - rothDraw*0.5;
          rothIRA = rothIRA*(1+gr) - rothDraw*0.5;
          hsaBal  = hsaBal *(1+gr);
          brok    = brok   *(1+gr);
          sav     = sav    *(1+grS);
        }

        if(total() <= 0) { ok=false; trad=0; roth401=0; rothIRA=0; hsaBal=0; brok=0; sav=0; }
      }
      data.push({ age, bal: Math.round(total()), curAge: q.curAge });
    }
    return { ok, data, final: data[data.length-1]?.bal || 0 };
  };


  const makeHcMonthly = (q) => (age, yrsR) => {
    const inf = Math.pow(1+q.inflation/100*1.25, yrsR);
    const married = q.filingStatus === "mfj";
    // Post-65: Medicare + supplement
    if(age >= 65) return q.post65HC * (married ? 2 : 1) * inf;
    // Pre-65: ACA mode or manual
    if(q.hcMode === "aca") {
      const incInf = q.retTaxableIncome * Math.pow(1+q.inflation/100, yrsR);
      const fpl = (married ? FPL_MFJ : FPL_SINGLE) * Math.pow(1+q.inflation/100, yrsR);
      const unsubInf = ((q.hasVA&&q.vaHealthVet ? q.vetHC : q.selfHC) + (married ? q.spouseHC : 0)) * Math.pow(1+q.inflation/100*1.25, yrsR);
      if(incInf <= 0) return unsubInf;
      const fplPct = incInf / fpl * 100;
      if(fplPct > 400) return unsubInf;
      let reqPct;
      if(fplPct <= 133)      reqPct = 0.0206;
      else if(fplPct <= 150) reqPct = 0.0309 + (fplPct-133)/(150-133)*(0.0412-0.0309);
      else if(fplPct <= 200) reqPct = 0.0412 + (fplPct-150)/(200-150)*(0.0618-0.0412);
      else if(fplPct <= 250) reqPct = 0.0618 + (fplPct-200)/(250-200)*(0.0824-0.0618);
      else if(fplPct <= 300) reqPct = 0.0824 + (fplPct-250)/(300-250)*(0.1030-0.0824);
      else                   reqPct = 0.1030;
      return Math.max(0, unsubInf - Math.max(0, unsubInf - incInf * reqPct / 12));
    } else {
      return ((q.hasVA&&q.vaHealthVet ? q.vetHC : q.selfHC) + (married ? q.spouseHC : 0)) * inf;
    }
  };
  // Default instance uses current p
  const hcMonthlyP = makeHcMonthly(p);


  // Roth/Traditional IRA: $7,500 base · $1,100 catch-up at 50+ = $8,600 total
  const rothIRALimit = p.curAge >= 50 ? 8600 : 7500;
  // HSA: $4,400 self-only · $8,750 family · +$1,000 catch-up at 55+
  const hsaLimitAnnual = (p.filingStatus === "mfj" ? 8750 : 4400) + (p.curAge >= 55 ? 1000 : 0);
  // 401k/403b/TSP: $24,500 base · +$8,000 at 50+ ($32,500) · ages 60-63 super catch-up = $35,750
  const k401kLimit = (p.curAge >= 60 && p.curAge <= 63) ? 35750 : p.curAge >= 50 ? 32500 : 24500;

  /* ══════ ACA SUBSIDY HELPER (component-level for use in both math and render) ══════ */
  const calcACA = (annualIncome) => {
    const married = p.filingStatus === "mfj";
    const fpl = married ? FPL_MFJ : FPL_SINGLE;
    const unsubRaw = (p.hasVA&&p.vaHealthVet ? p.vetHC : p.selfHC) + (married ? p.spouseHC : 0);
    if(annualIncome <= 0) return { premium: unsubRaw, subsidy: 0, fplPct: 0 };
    const fplPct = annualIncome / fpl * 100;
    if(fplPct > 400) return { premium: unsubRaw, subsidy: 0, fplPct };
    let reqPct;
    if(fplPct <= 133)       reqPct = 0.0206;
    else if(fplPct <= 150)  reqPct = 0.0309 + (fplPct-133)/(150-133)*(0.0412-0.0309);
    else if(fplPct <= 200)  reqPct = 0.0412 + (fplPct-150)/(200-150)*(0.0618-0.0412);
    else if(fplPct <= 250)  reqPct = 0.0618 + (fplPct-200)/(250-200)*(0.0824-0.0618);
    else if(fplPct <= 300)  reqPct = 0.0824 + (fplPct-250)/(300-250)*(0.1030-0.0824);
    else                    reqPct = 0.1030;
    const maxContrib = annualIncome * reqPct / 12;
    const subsidy = Math.max(0, unsubRaw - maxContrib);
    return { premium: Math.max(0, unsubRaw - subsidy), subsidy, fplPct };
  };

  /* ══════ CORE MATH ══════ */
  const C2 = useMemo(()=>{
    /* ── Loans ── */
    const debt1  = loanPayoff(p.debt1Bal,  p.debt1Rate,  p.debt1Monthly);
    const debt2  = loanPayoff(p.debt2Bal,  p.debt2Rate,  p.debt2Monthly);
    const debt3  = loanPayoff(p.debt3Bal,  p.debt3Rate,  p.debt3Monthly);
    const mort   = loanPayoff(p.mortBal,   p.mortRate,   p.mortPI);
    const totalNonMortDebt    = p.debt1Bal+p.debt2Bal+p.debt3Bal;
    const monthlyDebtPayments = p.debt1Monthly+p.debt2Monthly+p.debt3Monthly;
    const debtFreeYear = Math.max(
      p.debt1Bal>0?debt1.year:CY,
      p.debt2Bal>0?debt2.year:CY,
      p.debt3Bal>0?debt3.year:CY,
    );

    /* ── Portfolio totals ── */
    const trad401kTotal   = p.trad401kBal;
    const roth401kTotal   = p.roth401kBal;
    const totalRetirement = trad401kTotal + roth401kTotal + p.rothIRA;
    const totalInvested   = totalRetirement + p.brokerage + p.hsa;
    const totalLiquid     = totalInvested + p.cash;
    const rothFraction    = totalRetirement > 0 ? (roth401kTotal + p.rothIRA) / totalRetirement : 0;
    const sampleTradDraw  = 50000;
    const { effectiveRate: sampleEffRate } = calcTax(Math.max(0, sampleTradDraw - stdDed), mfj);
    const withdrawalTaxRate = (1 - rothFraction) * sampleEffRate;

    /* ── Contributions ── */
    const tradAmt = p.salary*(p.trad401kPct/100);
    const rothAmt = p.salary*(p.roth401kPct/100);
    const empM    = p.salary*(p.empMatchPct/100);
    const empB    = p.salary*(p.empBasePct/100);
    const empTotal = empM+empB;
    const hsaForYr = yr => {
      return p.hsaAnnual + p.hsaEmployer;
    };
    const annualToAccounts = tradAmt+rothAmt+empM+empB+p.hsaAnnual+p.hsaEmployer+p.rothIRAContrib;

    /* ── Taxes 2026 ── */
    const mfj = p.filingStatus === "mfj";
    const stdDed = mfj ? STD_DED_MFJ : STD_DED_SINGLE; // 2026 IRS
    const hcPremAnnual = p.hcPremiumPerPaycheck*PAYCHECKS_YR;
    const preTax  = tradAmt+p.hsaAnnual+hcPremAnnual;
    const agi     = Math.max(0, p.salary-preTax);
    const taxable = Math.max(0, agi-stdDed);
    const { tax: fedTax } = calcTax(taxable, mfj);
    const fica       = p.salary*FICA_RATE;
    const stateTaxAmt= agi*(p.stateTax/100);
    const takeHome   = (p.salary-preTax-rothAmt-fica-fedTax-stateTaxAmt)/12;
    const vaMonthly  = p.hasVA ? p.vaMonthly : 0;
    const totalIncome= takeHome+vaMonthly+(p.spouseIncome/12);

    /* ── Monthly expenses ── */
    const livingMonthly = p.electric+p.water+p.phone+p.internet+p.food+p.carInsurance+p.gasMonthly+p.other+p.propTax+p.homeInsurance;
    const mortMonthly   = p.mortTotal; // covers both rent and mortgage payment
    const totalExp      = mortMonthly+livingMonthly+monthlyDebtPayments;
    const cashFlow      = totalIncome-totalExp;

    /* ── Surplus routing — calculated per year in projection loops ── */
    const surplusInvest = p.surplusAction === "invest";
    const surplusToRet  = surplusInvest && p.surplusAccount==="401k";
    const surplusToRoth = surplusInvest && p.surplusAccount==="roth";
    const surplusToHsa  = surplusInvest && p.surplusAccount==="hsa";
    const surplusToBrok = surplusInvest && p.surplusAccount==="brokerage";
    const surplusToSav  = surplusInvest && p.surplusAccount==="savings";

    // Calculate year-specific surplus: income minus all active expenses and debts
    const yearlySurplus = (yrs) => {
      if(!surplusInvest) return { ret:0, roth:0, hsa:0, brok:0, sav:0 };
      const sal = p.salary * Math.pow(1+p.salaryGrowth/100, yrs);
      const trad = sal*(p.trad401kPct/100);
      const roth401 = sal*(p.roth401kPct/100);
      const empM2 = sal*(p.empMatchPct/100);
      const empB2 = sal*(p.empBasePct/100);
      const hcPrem = p.hcPremiumPerPaycheck*PAYCHECKS_YR;
      const preTax2 = trad+p.hsaAnnual+hcPrem;
      const agi2 = Math.max(0, sal-preTax2);
      const taxable2 = Math.max(0, agi2-(mfj ? STD_DED_MFJ : STD_DED_SINGLE));
      const { tax: fedTax2 } = calcTax(taxable2, mfj);
      const fica2 = sal*FICA_RATE;
      const state2 = agi2*(p.stateTax/100);
      const take2 = (sal-preTax2-roth401-fica2-fedTax2-state2)/12;
      const totalInc2 = take2 + (p.hasVA?p.vaMonthly:0) + (p.spouseIncome/12);
      // Debt payments still active this year
      const d1Active = p.debt1Bal>0 && yrs*12 < debt1.months ? p.debt1Monthly : 0;
      const d2Active = p.debt2Bal>0 && yrs*12 < debt2.months ? p.debt2Monthly : 0;
      const d3Active = p.debt3Bal>0 && yrs*12 < debt3.months ? p.debt3Monthly : 0;
      const mortActive = p.mortTotal; // rent or mortgage
      const totalExp2 = mortActive + livingMonthly + d1Active + d2Active + d3Active;
      const flow = Math.max(0, totalInc2 - totalExp2);
      return {
        ret:  surplusToRet  ? flow*12 : 0,
        roth: surplusToRoth ? flow*12 : 0,
        hsa:  surplusToHsa  ? flow*12 : 0,
        brok: surplusToBrok ? flow*12 : 0,
        sav:  surplusToSav  ? flow*12 : 0,
      };
    };

    /* ── Healthcare at retirement — uses component-level makeHcMonthly ── */
    const hcMonthly = hcMonthlyP;

    /* ── FIRE number ── */
    const ytt       = Math.max(0, p.retAge-p.curAge);
    const infMult   = Math.pow(1+p.inflation/100, ytt);
    const housingInflMult = Math.pow(1+p.inflation/100*1.5, ytt);
    // Homeowners: propTax+insurance inflates at 1.5x rate; renters: no propTax, homeInsurance already in livingMonthly at standard rate
    const baseMonthlyNoHousing = p.hasMortgage
      ? livingMonthly - p.propTax - p.homeInsurance
      : livingMonthly - p.homeInsurance; // renters insurance stays in living expenses
    const livInfl = p.hasMortgage
      ? (baseMonthlyNoHousing*12*(p.retRatio/100)*infMult) + (p.propTax+p.homeInsurance)*12*housingInflMult*(p.retRatio/100)
      : baseMonthlyNoHousing*12*(p.retRatio/100)*infMult;
    const extInfl   = p.retExtras*12*infMult;
    const mortAtRet = p.hasMortgage ? ((CY+ytt)<=p.mortPayoff ? p.mortTotal*12 : 0) : p.mortTotal*12;
    const hcAtRet   = hcMonthly(p.retAge,0)*12;
    const vaAtRet   = p.hasVA ? p.vaMonthly*12*Math.pow(1+p.vaCola/100,ytt) : 0;
    const ssAtRet   = p.hasSS&&p.ssAge<=p.retAge ? p.ssMonthly*12*infMult : 0;
    const guaranteedIncome = vaAtRet+ssAtRet;
    const totalNeed = livInfl+extInfl+mortAtRet+hcAtRet;
    const drawNeeded= Math.max(0, totalNeed-guaranteedIncome);
    // Duration-adjusted SWR — longer retirement needs lower withdrawal rate
    const retirementYears = p.planAge - p.retAge;
    const durationSWR = retirementYears >= 50 ? Math.min(p.swr, 3.0) :
                        retirementYears >= 45 ? Math.min(p.swr, 3.25) :
                        retirementYears >= 40 ? Math.min(p.swr, 3.5) :
                        retirementYears >= 35 ? Math.min(p.swr, 3.75) :
                        p.swr;
    const fireNum     = drawNeeded/(durationSWR/100);
    // Convert to today's dollars so the number is comparable across retirement ages
    const fireNumReal = fireNum/infMult;  // what you'd need to have TODAY
    // For pre-55 retirement, portfolio draws incur ~30% effective loss (10% penalty + taxes)
    // So you need more portfolio to net the same income — adjust FIRE number upward
    const earlyWithdrawalPenalty = p.retAge < 55 ? PRE55_PENALTY : 0;
    const fireNumRealAdj = earlyWithdrawalPenalty > 0
      ? fireNumReal * (1 + earlyWithdrawalPenalty * PRE55_PARTIAL) // partial adjustment since some funds (brokerage/Roth) are accessible
      : fireNumReal;
    const vaEquiv   = p.hasVA ? (vaAtRet/infMult)/(p.swr/100) : 0;  // today's dollars for apples-to-apples with fireNumReal
    const ssEquiv   = p.hasSS ? (ssAtRet/infMult)/(p.swr/100) : 0;

    /* ── Simulate portfolio — delegates to shared runSimulation engine ── */
    const simulate = retAge => runSimulation(
      p, livingMonthly, hcMonthly, yearlySurplus,
      { d1: debt1.months, d2: debt2.months, d3: debt3.months },
      retAge
    );

    /* ── Sweep FIRE ages ── */
    let earliest=null;
    const sweep=[];
    for(let ra=40;ra<=72;ra++){
      const { ok,final }=simulate(ra);

      // Calculate projected portfolio at this retirement age
      let projAtAge=totalInvested;
      const yrsToRa = Math.max(0, ra-p.curAge);
      for(let i=0;i<yrsToRa;i++){
        const yr=CY+i, sal=p.salary*Math.pow(1+p.salaryGrowth/100,i);
        const loanRepay=(p.debt3Bal>0&&i*12<debt3.months)?p.debt3Monthly*12:0;
        const surplusY = yearlySurplus(i);
        projAtAge=projAtAge*(1+p.growth/100)+sal*((p.trad401kPct+p.roth401kPct+p.empMatchPct+p.empBasePct)/100)+hsaForYr(yr)+p.rothIRAContrib+p.monthlyBrokerageContrib*12+loanRepay+surplusY.ret+surplusY.brok;
      }

      // Calculate FIRE number at this specific retirement age
      const yrsToRaVal = Math.max(0, ra-p.curAge);
      const infMultRa = Math.pow(1+p.inflation/100, yrsToRaVal);
      const retYrsRa = p.planAge - ra;
      const swrRa = retYrsRa >= 50 ? Math.min(p.swr,3.0) : retYrsRa >= 45 ? Math.min(p.swr,3.25) : retYrsRa >= 40 ? Math.min(p.swr,3.5) : retYrsRa >= 35 ? Math.min(p.swr,3.75) : p.swr;
      const vaAtRa = p.hasVA ? p.vaMonthly*12*Math.pow(1+p.vaCola/100,yrsToRaVal) : 0;
      const ssAtRa = p.hasSS&&p.ssAge<=ra ? p.ssMonthly*12*infMultRa : 0;
      const baseRa = p.hasMortgage ? (livingMonthly-p.propTax-p.homeInsurance) : (livingMonthly-p.homeInsurance);
      const livInflRa = p.hasMortgage
        ? baseRa*12*(p.retRatio/100)*infMultRa + (p.propTax+p.homeInsurance)*12*Math.pow(1+p.inflation/100*1.5,yrsToRaVal)*(p.retRatio/100)
        : baseRa*12*(p.retRatio/100)*infMultRa;
      const extInflRa = p.retExtras*12*infMultRa;
      const mortAtRa = p.hasMortgage ? ((CY+yrsToRaVal)<=p.mortPayoff ? p.mortTotal*12 : 0) : p.mortTotal*12;
      const hcAtRa = hcMonthly(ra,0)*12;
      const drawRa = Math.max(0, livInflRa+extInflRa+mortAtRa+hcAtRa-vaAtRa-ssAtRa);
      const fireNumRa = drawRa / (swrRa/100);
      const penaltyAdj = ra < 55 ? 1 + PRE55_PENALTY*PRE55_PARTIAL : 1;
      const fireNumRaReal = (fireNumRa/infMultRa) * penaltyAdj;
      const projRaReal = projAtAge/infMultRa;

      // Genuinely feasible = projected portfolio MEETS the FIRE number for that age
      // AND simulation confirms it lasts to plan age (running out after plan age is acceptable)
      const meetsFIRE = projRaReal >= fireNumRaReal;
      const genuinelyOk = ok && meetsFIRE;
      if(genuinelyOk&&!earliest) earliest=ra;
      sweep.push({ age:ra, ok:genuinelyOk, final });
    }
    const { data:chart }=simulate(p.retAge);

    /* ── Projected balance at target ── */
    let proj=totalInvested, projSav=0;
    for(let i=0;i<ytt;i++){
      const yr=CY+i, sal=p.salary*Math.pow(1+p.salaryGrowth/100,i);
      const loanRepay=(p.debt3Bal>0&&i*12<debt3.months)?p.debt3Monthly*12:0;
      const surplusYP = yearlySurplus(i);
      proj=proj*(1+p.growth/100)+sal*((p.trad401kPct+p.roth401kPct+p.empMatchPct+p.empBasePct)/100)+hsaForYr(yr)+p.rothIRAContrib+p.monthlyBrokerageContrib*12+loanRepay+(surplusYP.ret||0)+(surplusYP.roth||0)+(surplusYP.hsa||0)+(surplusYP.brok||0);
      projSav=projSav*(1+RATE_SAVINGS/100)+(surplusYP.sav||0);
    }
    proj += projSav;
    const projReal    = proj/infMult;     // projected portfolio in today's purchasing power
    const pctFunded = fireNumRealAdj>0 ? Math.min(200,(totalInvested/fireNumRealAdj)*100) : 100;
    const surplus   = projReal-fireNumRealAdj; // both in today's dollars

    /* ── Monthly draw available ── */
    const monthlyDraw = proj * durationSWR / 100 / 12;

    const rothIRAFiveYearSatisfied = (CY - p.rothIRAOpenYear) >= 5;
    const rule55Applies = p.retAge >= 55;
    return {
      rothIRAFiveYearSatisfied, rule55Applies,
      debt1, debt2, debt3, mort,
      totalNonMortDebt, monthlyDebtPayments, debtFreeYear,
      totalRetirement, totalInvested, totalLiquid, trad401kTotal, roth401kTotal, rothFraction, withdrawalTaxRate,
      tradAmt, rothAmt, empM, empB, empTotal, annualToAccounts,
      hcPremAnnual, preTax, agi, fedTax, fica, stateTaxAmt,
      takeHome, vaMonthly, totalIncome,
      livingMonthly, mortMonthly, totalExp, cashFlow,
      hcAtRet, mortAtRet, vaAtRet, ssAtRet, guaranteedIncome, vaEquiv, ssEquiv,
      totalNeed, drawNeeded, fireNum, fireNumReal, fireNumRealAdj, projReal, durationSWR, retirementYears, pctFunded, proj, surplus,
      earliest, sweep, chart, ytt, infMult, livInfl, monthlyDraw,
    };
  }, [p]);

  const [page, setPage] = useState(1);
  const [scenarioIdx, setScenarioIdx] = useState(null);
  const [scenarioRetAge, setScenarioRetAge] = useState(null); // for interactive retirement age scenario

  /* ══════ RENDER ══════ */

  /* wizard — shown until onboarded */
  if(!onboarded) return (
    <div style={{ ...S.body, display:"flex", flexDirection:"column", minHeight:"100vh" }}>
      <div style={{ background:"#0f1117", borderBottom:`1px solid ${C.border}`, padding:"14px 28px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, color:C.gold }}>Life Calculator</div>
        {step>1&&(
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ fontSize:10, color:C.muted, letterSpacing:"0.08em" }}>STEP {step-1} OF {TOTAL_STEPS-1}</div>
            <div style={{ width:120, height:3, background:C.border, borderRadius:2, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${((step-1)/(TOTAL_STEPS-1))*100}%`, background:`linear-gradient(90deg,${C.cyanDim},${C.cyan})`, borderRadius:2, transition:"width 0.3s" }}/>
            </div>
          </div>
        )}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"32px 20px" }}>
        <div style={{ width:"100%", maxWidth:560, margin:"0 auto" }}>
          {getWizStep(step)}
        </div>
      </div>
      {step>1&&(
        <div style={{ padding:"20px 40px", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", maxWidth:560, margin:"0 auto", width:"100%" }}>
          <WizBtn label="← Back" onClick={()=>setStep(s=>Math.max(1,s-1))} secondary/>
          <WizBtn
            label={step===TOTAL_STEPS?"See My Results →":"Next →"}
            onClick={()=>{ if(step===TOTAL_STEPS) setOnboarded(true); else setStep(s=>s+1); }}
          />
        </div>
      )}
    </div>
  );

  /* ── PAGE NAV ── */
  const NavBtn = ({ n, label, icon }) => (
    <button onClick={()=>setPage(n)} style={{
      padding:"8px 20px", borderRadius:8, border:"none", cursor:"pointer",
      fontFamily:"'Outfit',sans-serif", fontSize:12, fontWeight:600, letterSpacing:"0.04em",
      background: page===n ? `linear-gradient(135deg,${C.cyanDim},${C.cyan})` : C.card,
      color: page===n ? "#000" : C.dim,
      border: page===n ? "none" : `1px solid ${C.border}`,
      transition:"all 0.2s",
    }}>{icon} {label}</button>
  );

  /* ── EXPORT / IMPORT ── */
  const exportCSV = () => {
    // Section 1 — inputs
    const inputRows = [['key','value'], ...Object.entries(p).map(([k,v])=>[k,v])];
    // Section 2 — simulated projection
    const projRows = [['',''],['age','portfolio_balance'], ...C2.chart.map(d=>[d.age, d.bal])];
    const allRows = [...inputRows, ...projRows];
    const csv = allRows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `life-calculator-${CY}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const importCSV = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const lines = ev.target.result.trim().split('\n').slice(1); // skip header
        const imported = {};
        lines.forEach(line => {
          const [rawK, rawV] = line.split(',').map(s=>s.replace(/^"|"$/g,'').replace(/""/g,'"'));
          if(rawK && rawV !== undefined) {
            const num = parseFloat(rawV);
            // Booleans stored as "true"/"false"
            if(rawV==='true') imported[rawK] = true;
            else if(rawV==='false') imported[rawK] = false;
            else if(!isNaN(num) && rawV.trim()!=='') imported[rawK] = num;
            else imported[rawK] = rawV;
          }
        });
        // Merge with defaults so missing keys don't break anything
        setP({ ...DEFAULTS, ...imported });
        setOnboarded(true);
      } catch(err) {
        alert('Could not read CSV. Make sure it was exported from Life Calculator.');
      }
    };
    reader.readAsText(file);
    e.target.value = ''; // reset so same file can be re-imported
  };

  /* ── SHARED HEADER ── */
  const Header = () => (
    <div style={{ ...S.header, top:0 }}>
      <div style={{ maxWidth:1200, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ ...S.serif, fontSize:24, fontWeight:700, color:C.text, lineHeight:1 }}>
              Life <span style={{ color:C.cyan }}>Calculator</span>
            </div>
            <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>Retirement & Financial Independence · {CY}</div>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <NavBtn n={1} icon="🎯" label="Overview"/>
            <NavBtn n={2} icon="📈" label="Projection"/>
            <NavBtn n={3} icon="⚙️" label="Variables"/>
            <button onClick={()=>{setStep(2);setOnboarded(false);}} style={{ padding:"8px 14px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:11, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>
              ✏️ Edit
            </button>
            <button onClick={exportCSV} style={{ padding:"8px 14px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:11, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>
              ⬇ Export
            </button>
            <label style={{ padding:"8px 14px", borderRadius:8, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:11, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>
              ⬆ Import
              <input type="file" accept=".csv" onChange={importCSV} style={{ display:"none" }}/>
            </label>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{ marginTop:10, height:3, background:C.border, borderRadius:3, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${Math.min(100,C2.pctFunded)}%`, background:`linear-gradient(90deg,${C.cyanDim},${C.cyan})`, borderRadius:3 }}/>
        </div>
      </div>
    </div>
  );

  /* ════════════════════════════════════
     PAGE 1 — OVERVIEW
  ════════════════════════════════════ */
  const Page1 = () => {
    const onTrack = C2.projReal >= C2.fireNumRealAdj;
    const maxDraw = C2.monthlyDraw;

    // Solve for required extra monthly contribution to retire at target age
    const solveForContrib = () => {
      const target = C2.fireNumRealAdj * C2.infMult; // future dollars needed
